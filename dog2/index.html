<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ipatch Mobile IPTV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<!-- PWA SUPPORT -->
<link rel="manifest" href="data:application/manifest+json,{
  &quot;name&quot;:&quot;Ipatch IPTV&quot;,
  &quot;short_name&quot;:&quot;IPTV&quot;,
  &quot;start_url&quot;:&quot;.&quot;,
  &quot;display&quot;:&quot;standalone&quot;,
  &quot;background_color&quot;:&quot;#000&quot;,
  &quot;theme_color&quot;:&quot;#000&quot;
}"/>

<style>
    body {
        margin: 0;
        background: #000;
        font-family: Arial, sans-serif;
        color: #fff;
        display: flex;
        flex-direction: column;
        height: 100vh;
    }

    video {
        width: 100%;
        height: 40vh;
        background: black;
        object-fit: cover; /* 🔥 removes black bars */
    }

    .controls {
        padding: 10px;
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    select {
        padding: 10px;
        border-radius: 6px;
        border: none;
        font-size: 14px;
    }

    .buttons {
        display: flex;
        gap: 10px;
        justify-content: space-between;
    }

    button {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: #1c1c1c;
        color: white;
        font-size: 14px;
    }

    button:active {
        background: #333;
    }
</style>
</head>

<body>

<video id="video" controls autoplay playsinline></video>

<div class="controls">

    <select id="category"></select>
    <select id="channel"></select>

    <div class="buttons">
        <button onclick="prevChannel()">⟨ Prev</button>
        <button onclick="nextChannel()">Next ⟩</button>
        <button onclick="randomChannel()">Random</button>
        <button onclick="togglePlay()">Play/Pause</button>
    </div>

</div>

<script>
const PLAYLIST_URL = "https://iptv-org.github.io/iptv/index.category.m3u";

let channels = [];
let filtered = [];
let currentIndex = 0;

const video = document.getElementById("video");
const categorySel = document.getElementById("category");
const channelSel = document.getElementById("channel");

/* =========================
   🔥 FAST HLS ENGINE (IMPORTANT)
   ========================= */
let hls = null;

function createHLS() {
    if (hls) {
        hls.destroy();
    }

    hls = new Hls({
        lowLatencyMode: true,
        maxBufferLength: 2,
        backBufferLength: 0,
        enableWorker: true
    });

    hls.attachMedia(video);
}

/* =========================
   M3U PARSER
   ========================= */
function parseM3U(text) {
    const lines = text.split("\n");
    let result = [];
    let current = null;

    for (let line of lines) {
        line = line.trim();
        if (!line) continue;

        if (line.startsWith("#EXTINF")) {
            const match = line.match(/#EXTINF:-?\d+\s*(.*),(.*)/);
            if (!match) continue;

            const meta = match[1];
            const name = match[2]?.trim() || "Unnamed";

            let group = "Other";
            const g = meta.match(/group-title="(.*?)"/);
            if (g) group = g[1];

            current = { name, group };
        } 
        else if (!line.startsWith("#") && current) {
            current.url = line;
            result.push(current);
            current = null;
        }
    }
    return result;
}

/* =========================
   LOAD PLAYLIST
   ========================= */
async function loadPlaylist() {
    const res = await fetch(PLAYLIST_URL);
    const text = await res.text();

    channels = parseM3U(text);

    const groups = [...new Set(channels.map(c => c.group))].sort();

    categorySel.innerHTML = `<option>All</option>` +
        groups.map(g => `<option>${g}</option>`).join("");

    applyFilter();
}

/* =========================
   FILTER
   ========================= */
function applyFilter() {
    const cat = categorySel.value;

    filtered = cat === "All"
        ? channels
        : channels.filter(c => c.group === cat);

    channelSel.innerHTML = filtered
        .map((c, i) => `<option value="${i}">${c.name}</option>`)
        .join("");

    currentIndex = 0;
    playChannel();
}

/* =========================
   🚀 FAST ZAPPING ENGINE
   ========================= */
function playChannel() {
    if (!filtered.length) return;

    const ch = filtered[currentIndex];
    channelSel.value = currentIndex;

    createHLS();

    if (ch.url.endsWith(".m3u8") && Hls.isSupported()) {

        hls.loadSource(ch.url);
        hls.startLoad();

        hls.on(Hls.Events.MANIFEST_PARSED, () => {
            video.play().catch(()=>{});
        });

    } else {
        video.src = ch.url;
        video.play().catch(()=>{});
    }
}

/* =========================
   CONTROLS
   ========================= */
function nextChannel() {
    if (!filtered.length) return;
    currentIndex = (currentIndex + 1) % filtered.length;
    playChannel();
}

function prevChannel() {
    if (!filtered.length) return;
    currentIndex = (currentIndex - 1 + filtered.length) % filtered.length;
    playChannel();
}

function randomChannel() {
    if (!filtered.length) return;
    currentIndex = Math.floor(Math.random() * filtered.length);
    playChannel();
}

function togglePlay() {
    if (video.paused) video.play();
    else video.pause();
}

/* =========================
   EVENTS
   ========================= */
categorySel.addEventListener("change", applyFilter);

channelSel.addEventListener("change", () => {
    currentIndex = parseInt(channelSel.value);
    playChannel();
});

/* =========================
   START
   ========================= */
loadPlaylist();

/* =========================
   📱 MAKE IT MOBILE APP (PWA)
   ========================= */
if ('serviceWorker' in navigator) {
    const sw = `
        self.addEventListener('fetch', function(e) {});
    `;
    const blob = new Blob([sw], { type: 'application/javascript' });
    navigator.serviceWorker.register(URL.createObjectURL(blob));
}
</script>

</body>
</html>
