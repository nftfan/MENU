<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IPTV TV Style</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

html, body {
    margin: 0;
    height: 100%;
    background: #111;
    font-family: Arial, sans-serif;
    color: white;
}

/* =========================
   TV SCREEN AREA (TOP)
   ========================= */
.tv-container {
    position: relative;
    width: 100%;
    height: 55vh;
    background: #2a2a2a; /* 🧱 GREY TV FRAME */
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

/* VIDEO INSIDE TV */
video {
    width: 100%;
    height: 100%;
    object-fit: contain; /* full video visible */
    background: #2a2a2a; /* match TV frame */
}

/* =========================
   CONTROLS AREA
   ========================= */
.controls {
    height: 45vh;
    padding: 12px;
    background: #0f0f0f;
    box-sizing: border-box;
}

/* MODERN DROPDOWNS */
select {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 10px;
    border: 1px solid #333;
    background: #1a1a1a;
    color: white;
    font-size: 14px;
}

/* BUTTONS */
.buttons {
    display: flex;
    gap: 10px;
}

button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: #1e1e1e;
    color: white;
    font-size: 14px;
}

button:active {
    background: #333;
    transform: scale(0.98);
}

.title {
    font-size: 12px;
    opacity: 0.6;
    margin-bottom: 5px;
}

</style>
</head>

<body>

<!-- ================= TV SCREEN ================= -->
<div class="tv-container">
    <video id="video" controls autoplay playsinline></video>
</div>

<!-- ================= CONTROLS ================= -->
<div class="controls">

    <div class="title">Category</div>
    <select id="category"></select>

    <div class="title">Channel</div>
    <select id="channel"></select>

    <div class="buttons">
        <button onclick="prev()">⟨ Prev</button>
        <button onclick="next()">Next ⟩</button>
        <button onclick="randomCh()">Shuffle</button>
        <button onclick="toggle()">Play</button>
    </div>

</div>

<script>

const URL = "https://iptv-org.github.io/iptv/index.category.m3u";

let channels = [];
let filtered = [];
let index = 0;

const video = document.getElementById("video");
const categorySel = document.getElementById("category");
const channelSel = document.getElementById("channel");

let hls;

/* =========================
   PARSER
   ========================= */
function parseM3U(text) {
    let out = [];
    let cur = null;

    text.split("\n").forEach(l => {
        l = l.trim();
        if (!l) return;

        if (l.startsWith("#EXTINF")) {
            const m = l.match(/#EXTINF:-?\d+\s*(.*),(.*)/);
            if (!m) return;

            let group = "Other";
            const g = m[1].match(/group-title="(.*?)"/);
            if (g) group = g[1];

            cur = { name: m[2], group };
        }
        else if (!l.startsWith("#") && cur) {
            cur.url = l;
            out.push(cur);
            cur = null;
        }
    });

    return out;
}

/* =========================
   LOAD
   ========================= */
async function load() {
    const res = await fetch(URL);
    const text = await res.text();

    channels = parseM3U(text);

    const groups = [...new Set(channels.map(c => c.group))].sort();

    categorySel.innerHTML =
        `<option>All</option>` +
        groups.map(g => `<option>${g}</option>`).join("");

    applyFilter();
}

/* =========================
   FILTER
   ========================= */
function applyFilter() {
    const cat = categorySel.value;

    filtered = cat === "All"
        ? channels
        : channels.filter(c => c.group === cat);

    channelSel.innerHTML = filtered
        .map((c, i) => `<option value="${i}">${c.name}</option>`)
        .join("");

    index = 0;
    play();
}

/* =========================
   PLAY ENGINE
   ========================= */
function play() {
    if (!filtered.length) return;

    const ch = filtered[index];
    channelSel.value = index;

    if (hls) hls.destroy();

    if (ch.url.includes(".m3u8") && Hls.isSupported()) {

        hls = new Hls({
            lowLatencyMode: true,
            maxBufferLength: 2
        });

        hls.loadSource(ch.url);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, () => {
            video.play().catch(()=>{});
        });

    } else {
        video.src = ch.url;
        video.play().catch(()=>{});
    }
}

/* =========================
   CONTROLS
   ========================= */
function next() {
    index = (index + 1) % filtered.length;
    play();
}

function prev() {
    index = (index - 1 + filtered.length) % filtered.length;
    play();
}

function randomCh() {
    index = Math.floor(Math.random() * filtered.length);
    play();
}

function toggle() {
    video.paused ? video.play() : video.pause();
}

/* =========================
   EVENTS
   ========================= */
categorySel.addEventListener("change", applyFilter);

channelSel.addEventListener("change", () => {
    index = parseInt(channelSel.value);
    play();
});

/* START */
load();

</script>

</body>
</html>
