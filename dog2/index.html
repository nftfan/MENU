<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>IPTV Modern Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
html, body {
    margin: 0;
    height: 100%;
    background: #0a0a0a;
    font-family: system-ui, -apple-system, Arial;
    overflow: hidden;
    color: white;
}

/* =========================
   VIDEO (NO CROPPING, NO BARS)
   ========================= */
video {
    width: 100vw;
    height: 55vh;
    background: black;
    object-fit: contain; /* ✅ FULL VIDEO VISIBLE */
    display: block;
}

/* =========================
   UI WRAPPER
   ========================= */
.ui {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 45vh;
    background: rgba(20,20,20,0.75);
    backdrop-filter: blur(15px);
    border-top-left-radius: 18px;
    border-top-right-radius: 18px;
    padding: 14px;
    box-sizing: border-box;
}

/* =========================
   MODERN DROPDOWNS
   ========================= */
select {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    background: #151515;
    color: white;
    font-size: 14px;
    outline: none;
}

/* =========================
   BUTTON ROW (MODERN STYLE)
   ========================= */
.buttons {
    display: flex;
    gap: 10px;
}

button {
    flex: 1;
    padding: 12px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(145deg, #1f1f1f, #141414);
    color: white;
    font-size: 14px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    transition: 0.2s;
}

button:active {
    transform: scale(0.97);
    background: #2a2a2a;
}

/* =========================
   TITLE STYLE (optional feel)
   ========================= */
.title {
    font-size: 13px;
    opacity: 0.6;
    margin-bottom: 6px;
}
</style>
</head>

<body>

<video id="video" controls autoplay playsinline></video>

<div class="ui">

    <div class="title">Category</div>
    <select id="category"></select>

    <div class="title">Channel</div>
    <select id="channel"></select>

    <div class="buttons">
        <button onclick="prevChannel()">⟨ Prev</button>
        <button onclick="nextChannel()">Next ⟩</button>
        <button onclick="randomChannel()">Shuffle</button>
        <button onclick="togglePlay()">Play</button>
    </div>

</div>

<script>

const URL = "https://iptv-org.github.io/iptv/index.category.m3u";

let channels = [];
let filtered = [];
let index = 0;

const video = document.getElementById("video");
const categorySel = document.getElementById("category");
const channelSel = document.getElementById("channel");

let hls;

/* =========================
   PARSER
   ========================= */
function parseM3U(text) {
    let out = [];
    let cur = null;

    text.split("\n").forEach(l => {
        l = l.trim();
        if (!l) return;

        if (l.startsWith("#EXTINF")) {
            const m = l.match(/#EXTINF:-?\d+\s*(.*),(.*)/);
            if (!m) return;

            let group = "Other";
            const g = m[1].match(/group-title="(.*?)"/);
            if (g) group = g[1];

            cur = { name: m[2], group };
        }
        else if (!l.startsWith("#") && cur) {
            cur.url = l;
            out.push(cur);
            cur = null;
        }
    });

    return out;
}

/* =========================
   LOAD
   ========================= */
async function load() {
    const res = await fetch(URL);
    const text = await res.text();

    channels = parseM3U(text);

    const groups = [...new Set(channels.map(c => c.group))].sort();

    categorySel.innerHTML =
        `<option value="All">All Channels</option>` +
        groups.map(g => `<option>${g}</option>`).join("");

    applyFilter();
}

/* =========================
   FILTER
   ========================= */
function applyFilter() {
    const cat = categorySel.value;

    filtered = cat === "All"
        ? channels
        : channels.filter(c => c.group === cat);

    channelSel.innerHTML = filtered
        .map((c, i) => `<option value="${i}">${c.name}</option>`)
        .join("");

    index = 0;
    play();
}

/* =========================
   PLAY ENGINE
   ========================= */
function play() {
    if (!filtered.length) return;

    const ch = filtered[index];
    channelSel.value = index;

    if (hls) hls.destroy();

    if (ch.url.includes(".m3u8") && Hls.isSupported()) {

        hls = new Hls({
            lowLatencyMode: true,
            maxBufferLength: 2
        });

        hls.loadSource(ch.url);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, () => {
            video.play().catch(()=>{});
        });

    } else {
        video.src = ch.url;
        video.play().catch(()=>{});
    }
}

/* =========================
   CONTROLS
   ========================= */
function nextChannel() {
    index = (index + 1) % filtered.length;
    play();
}

function prevChannel() {
    index = (index - 1 + filtered.length) % filtered.length;
    play();
}

function randomChannel() {
    index = Math.floor(Math.random() * filtered.length);
    play();
}

function togglePlay() {
    video.paused ? video.play() : video.pause();
}

/* =========================
   EVENTS
   ========================= */
categorySel.addEventListener("change", applyFilter);

channelSel.addEventListener("change", () => {
    index = parseInt(channelSel.value);
    play();
});

/* START */
load();

</script>

</body>
</html>
