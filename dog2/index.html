<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Fast TV IPTV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

html, body {
    margin: 0;
    height: 100%;
    background: #0f0f0f;
    font-family: Arial;
    overflow: hidden;
    color: white;
}

/* =========================
   TV SCREEN (TOP)
   ========================= */
.tv {
    position: relative;
    width: 100%;
    height: 58vh;
    background: #1c1c1c;
    border-top: 1px solid #444; /* 🔥 thin grey TV line */
    overflow: hidden;
}

/* VIDEO (1px UP EFFECT) */
video {
    width: 100%;
    height: calc(100% + 1px); /* 🔥 requested shift */
    margin-top: -1px;         /* subtle TV lift */
    object-fit: cover;
    background: black;
    transition: opacity 0.25s ease, transform 0.25s ease;
}

/* FADE ANIMATION CLASS */
.fade-out {
    opacity: 0;
    transform: scale(1.01);
}

/* =========================
   CONTROLS
   ========================= */
.controls {
    height: 42vh;
    padding: 14px;
    background: #0a0a0a;
}

/* DROPDOWNS */
select {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 10px;
    border: 1px solid #222;
    background: #151515;
    color: white;
}

/* =========================
   RANDOM BUTTON ONLY (CIRCLE)
   ========================= */
.random-btn {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: none;
    background: radial-gradient(circle, #2a2a2a, #111);
    color: white;
    font-size: 14px;
    margin: 10px auto 0;
    display: block;
    box-shadow: 0 6px 15px rgba(0,0,0,0.6);
}

.random-btn:active {
    transform: scale(0.92);
}

/* labels */
.label {
    font-size: 12px;
    opacity: 0.6;
    margin: 6px 0;
}

</style>
</head>

<body>

<div class="tv">
    <video id="video" autoplay playsinline controls></video>
</div>

<div class="controls">

    <div class="label">Category</div>
    <select id="category"></select>

    <div class="label">Channel</div>
    <select id="channel"></select>

    <button class="random-btn" onclick="randomChannel()">RANDOM</button>

</div>

<script>

const URL = "https://iptv-org.github.io/iptv/index.category.m3u";

let channels = [];
let filtered = [];
let index = 0;

const video = document.getElementById("video");
const categorySel = document.getElementById("category");
const channelSel = document.getElementById("channel");

let hls = null;

/* =========================
   PARSER
   ========================= */
function parseM3U(text) {
    let out = [];
    let cur = null;

    text.split("\n").forEach(l => {
        l = l.trim();
        if (!l) return;

        if (l.startsWith("#EXTINF")) {
            const m = l.match(/#EXTINF:-?\d+\s*(.*),(.*)/);
            if (!m) return;

            let group = "Other";
            const g = m[1].match(/group-title="(.*?)"/);
            if (g) group = g[1];

            cur = { name: m[2], group };
        }
        else if (!l.startsWith("#") && cur) {
            cur.url = l;
            out.push(cur);
            cur = null;
        }
    });

    return out;
}

/* =========================
   LOAD
   ========================= */
async function load() {
    const res = await fetch(URL);
    const text = await res.text();

    channels = parseM3U(text);

    const groups = [...new Set(channels.map(c => c.group))].sort();

    categorySel.innerHTML =
        `<option>All</option>` +
        groups.map(g => `<option>${g}</option>`).join("");

    applyFilter();
}

/* =========================
   FILTER
   ========================= */
function applyFilter() {
    const cat = categorySel.value;

    filtered = cat === "All"
        ? channels
        : channels.filter(c => c.group === cat);

    channelSel.innerHTML = filtered
        .map((c, i) => `<option value="${i}">${c.name}</option>`)
        .join("");

    index = 0;
    play(true);
}

/* =========================
   ⚡ PRELOAD ENGINE (NEXT CHANNEL)
   ========================= */
let preloaded = null;

function preloadNext() {
    if (!filtered.length) return;

    const nextIndex = (index + 1) % filtered.length;
    const next = filtered[nextIndex];

    if (next.url.includes(".m3u8") && Hls.isSupported()) {
        const temp = new Hls({ maxBufferLength: 5 });
        temp.loadSource(next.url);
        temp.attachMedia(document.createElement("video"));
        preloaded = temp;
    }
}

/* =========================
   🚀 FAST SWITCH + ANIMATION
   ========================= */
function play(skipAnim = false) {
    if (!filtered.length) return;

    const ch = filtered[index];
    channelSel.value = index;

    if (!skipAnim) {
        video.classList.add("fade-out");
    }

    setTimeout(() => {

        if (hls) hls.destroy();

        if (ch.url.includes(".m3u8") && Hls.isSupported()) {

            hls = new Hls({
                lowLatencyMode: true,
                maxBufferLength: 2
            });

            hls.loadSource(ch.url);
            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play().catch(()=>{});
            });

        } else {
            video.src = ch.url;
            video.play().catch(()=>{});
        }

        video.classList.remove("fade-out");

        // 🔥 preload next channel AFTER switch
        setTimeout(preloadNext, 300);

    }, skipAnim ? 0 : 180);
}

/* =========================
   RANDOM ONLY BUTTON
   ========================= */
function randomChannel() {
    index = Math.floor(Math.random() * filtered.length);
    play();
}

/* =========================
   FILTER EVENTS
   ========================= */
categorySel.addEventListener("change", applyFilter);

channelSel.addEventListener("change", () => {
    index = parseInt(channelSel.value);
    play();
});

/* START */
load();

</script>

</body>
</html>
