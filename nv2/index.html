
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Dispatch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0a;
  --paper:#f5f1e8;
  --paper2:#e8e0cf;
  --ink:#181513;
  --ink2:#3a342e;
  --ink3:#6b6259;
  --rule:#d8cfb9;
  --accent:#d94f2c;
  --gold:#c89b3c;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{
  height:100dvh;width:100%;overflow:hidden;
  background:var(--bg);color:var(--paper);
  font-family:'Inter',sans-serif;
  overscroll-behavior:none;
  -webkit-font-smoothing:antialiased;
}
.app{
  height:100dvh;display:flex;flex-direction:column;
  padding-top:var(--safe-top);padding-bottom:var(--safe-bottom);
}
.masthead{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 14px 8px;
  border-bottom:1px solid rgba(245,241,232,0.08);
  flex-shrink:0;
}
.brand-name{
  font-family:'Playfair Display',serif;font-weight:900;font-size:22px;
  letter-spacing:-0.02em;color:var(--paper);cursor:pointer;
}
.brand-name .dot{color:var(--accent)}
.masthead-time{
  font-family:'JetBrains Mono',monospace;font-size:9px;
  color:var(--ink3);letter-spacing:0.15em;text-align:right;
  display:flex;flex-direction:column;gap:2px;
}
.live-dot{
  width:5px;height:5px;background:var(--accent);border-radius:50%;
  display:inline-block;margin-right:4px;
  animation:pulse 1.6s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.topics{
  display:flex;gap:6px;padding:8px 14px;overflow-x:auto;scrollbar-width:none;
  border-bottom:1px solid rgba(245,241,232,0.08);flex-shrink:0;
}
.topics::-webkit-scrollbar{display:none}
.pill{
  flex-shrink:0;padding:5px 11px;border:1px solid rgba(245,241,232,0.15);
  border-radius:100px;font-family:'JetBrains Mono',monospace;font-size:9px;
  font-weight:700;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--ink3);background:transparent;cursor:pointer;
  transition:all 0.2s ease;white-space:nowrap;display:inline-flex;align-items:center;gap:5px;
}
.pill:hover{color:var(--paper);border-color:rgba(245,241,232,0.35)}
.pill.active{background:var(--paper);color:var(--ink);border-color:var(--paper)}
.pill.add{color:var(--accent);border-color:var(--accent);border-style:dashed}
.pill.add:hover{background:var(--accent);color:var(--paper);border-style:solid}
.pill .rx{font-size:11px;opacity:0.6}
.bar-track{height:2px;background:rgba(245,241,232,0.06);flex-shrink:0;overflow:hidden;position:relative}
.bar-fill{position:absolute;inset:0 100% 0 0;background:linear-gradient(90deg,var(--accent),var(--gold));transition:right 0.4s ease}
.bar-fill.ind{inset:0;right:0;transform:translateX(-100%);animation:ind 1s cubic-bezier(0.4,0,0.2,1) infinite}
@keyframes ind{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.stage{flex:1;position:relative;overflow:hidden;padding:10px 14px 0}
.counter{
  font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.18em;
  color:var(--ink3);text-transform:uppercase;margin-bottom:8px;
  display:flex;justify-content:space-between;
}
.counter .tl{color:var(--accent);font-weight:700}
.card-wrap{position:relative;height:calc(100% - 30px)}
.card{
  position:absolute;inset:0;
  background:var(--paper);color:var(--ink);border-radius:4px;
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 20px 40px -10px rgba(0,0,0,0.6),0 8px 16px -4px rgba(0,0,0,0.4);
}
.card.entering{animation:cin 0.5s cubic-bezier(0.2,0.8,0.2,1) forwards}
.card.exiting{animation:cout 0.35s cubic-bezier(0.6,0,0.8,0.3) forwards;pointer-events:none}
@keyframes cin{from{opacity:0;transform:translateY(36px) scale(0.96)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes cout{from{opacity:1;transform:translateY(0) scale(1)}to{opacity:0;transform:translateY(-28px) scale(0.97)}}
.card-hero{
  position:relative;width:100%;flex-shrink:0;
  height:36%;min-height:120px;max-height:200px;overflow:hidden;
  background:linear-gradient(135deg,#2a2520,#1a1614);
}
.card-hero img{width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:opacity 0.5s ease}
.card-hero img.loaded{opacity:1}
.card-hero.no-img{
  background:repeating-linear-gradient(45deg,transparent,transparent 12px,rgba(245,241,232,0.02) 12px,rgba(245,241,232,0.02) 13px),
  linear-gradient(135deg,var(--ink),#2a2520);
  display:flex;align-items:center;justify-content:center;
}
.no-img .fl{
  font-family:'Playfair Display',serif;font-weight:900;font-size:72px;
  color:var(--accent);opacity:0.4;line-height:1;
}
.hero-spin{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
}
.hero-spin::before{
  content:'';width:22px;height:22px;border:2px solid rgba(245,241,232,0.12);
  border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.card-body{
  flex:1;padding:14px 16px 14px;display:flex;flex-direction:column;overflow:hidden;
}
.card-tag-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.stag{
  font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;
  letter-spacing:0.22em;text-transform:uppercase;color:var(--accent);
  padding:3px 7px;border:1px solid var(--accent);border-radius:2px;
}
.snum{
  font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;
  text-transform:uppercase;color:var(--ink3);margin-left:auto;
}
.hline{height:3px;background:var(--ink);width:30px;margin-bottom:8px}
.headline{
  font-family:'Playfair Display',serif;font-weight:900;
  font-size:clamp(20px,5vw,26px);
  line-height:1.1;color:var(--ink);letter-spacing:-0.02em;
  margin-bottom:8px;
  display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;overflow:hidden;
}
.headline.lg{font-size:clamp(17px,4.2vw,22px);-webkit-line-clamp:6}
.headline.xl{font-size:clamp(15px,3.8vw,19px);-webkit-line-clamp:7}
.desc{
  font-family:'Inter',sans-serif;font-size:10px;line-height:1.5;
  color:var(--ink2);margin-bottom:10px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.src-row{
  display:flex;align-items:center;gap:6px;margin-top:auto;
  padding-top:10px;border-top:1px solid var(--rule);
}
.src-name{
  font-family:'Playfair Display',serif;font-style:italic;font-weight:700;
  font-size:10px;color:var(--ink2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.src-time{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--ink3);letter-spacing:0.08em}
.read-link{
  display:inline-flex;align-items:center;gap:5px;margin-top:8px;
  padding:7px 11px;background:var(--ink);color:var(--paper);border-radius:2px;
  text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:9px;
  font-weight:700;letter-spacing:0.15em;text-transform:uppercase;
  align-self:flex-start;transition:background 0.2s ease;
}
.read-link:hover{background:var(--accent)}
.state-card{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;
  color:var(--ink3);font-family:'JetBrains Mono',monospace;
  font-size:9px;letter-spacing:0.18em;text-transform:uppercase;padding:24px;text-align:center;
}
.state-card .sicon{font-family:'Playfair Display',serif;font-size:48px;color:var(--accent);opacity:0.6;line-height:1}
.state-card .smsg{
  font-family:'Playfair Display',serif;font-style:italic;font-size:14px;font-weight:400;
  color:var(--paper);text-transform:none;letter-spacing:0;opacity:0.8;max-width:240px;
}
.spinner{width:34px;height:34px;border:2px solid rgba(245,241,232,0.1);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
.fab{
  position:fixed;
  right:20px;
  bottom:calc(20px + var(--safe-bottom));
  width:56px;height:56px;border-radius:50%;
  background:var(--accent);color:var(--paper);border:none;
  box-shadow:0 4px 20px rgba(217,79,44,0.5);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform 0.15s ease,background 0.15s ease;
  z-index:100;
}
.fab:hover{background:#c8421e;transform:scale(1.06)}
.fab:active{transform:scale(0.93)}
.fab:disabled{opacity:0.4;cursor:not-allowed}
.fab svg{width:26px;height:26px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.prev-btn{
  position:fixed;left:20px;bottom:calc(20px + var(--safe-bottom));
  width:44px;height:44px;border-radius:50%;
  background:rgba(245,241,232,0.08);border:1px solid rgba(245,241,232,0.15);
  color:var(--paper);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s ease;z-index:100;
}
.prev-btn:hover{background:rgba(245,241,232,0.15)}
.prev-btn:active{transform:scale(0.93)}
.prev-btn:disabled{opacity:0.25;cursor:not-allowed}
.prev-btn svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,0.75);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  display:none;align-items:center;justify-content:center;z-index:1000;padding:20px;
}
.modal-bg.open{display:flex;animation:fin 0.2s ease}
@keyframes fin{from{opacity:0}to{opacity:1}}
.modal{
  width:100%;max-width:340px;background:#141414;
  border:1px solid rgba(245,241,232,0.1);border-radius:8px;padding:20px;
  animation:min 0.3s cubic-bezier(0.2,0.8,0.2,1);
}
@keyframes min{from{transform:translateY(16px) scale(0.96);opacity:0}to{transform:none;opacity:1}}
.modal h3{font-family:'Playfair Display',serif;font-weight:700;font-size:20px;color:var(--paper);margin-bottom:2px;letter-spacing:-0.02em}
.modal .msub{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink3);margin-bottom:14px}
.modal input{
  width:100%;background:var(--bg);border:1px solid rgba(245,241,232,0.15);
  color:var(--paper);padding:10px 12px;border-radius:4px;
  font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color 0.2s ease;
}
.modal input:focus{border-color:var(--accent)}
.modal-acts{display:flex;gap:8px;margin-top:14px}
.mbtn{
  flex:1;padding:10px;border:1px solid rgba(245,241,232,0.15);
  background:transparent;color:var(--paper);border-radius:4px;
  font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;
  letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;transition:all 0.2s ease;
}
.mbtn:hover{background:rgba(245,241,232,0.05)}
.mbtn.pri{background:var(--accent);border-color:var(--accent)}
.mbtn.pri:hover{background:#c8421e}
.field-lbl{display:block;font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink3);margin:12px 0 5px}
</style>
</head>
<body>
<div class="app">
  <header class="masthead">
    <div class="brand-name" id="brand-name">Dispatch<span class="dot">.</span></div>
    <div class="masthead-time">
      <span id="date-text"></span>
      <span><span class="live-dot"></span><span id="clock-text"></span></span>
    </div>
  </header>

  <div class="topics" id="topics-strip"></div>

  <div class="bar-track"><div class="bar-fill" id="bar"></div></div>

  <main class="stage">
    <div class="counter">
      <span><span class="tl" id="c-topic">TOP</span> · <span id="c-pos">— / —</span></span>
      <span id="c-src">Live feed</span>
    </div>
    <div class="card-wrap" id="card-wrap">
      <div class="state-card"><div class="spinner"></div><div class="smsg">Gathering today's headlines…</div></div>
    </div>
  </main>
</div>

<button class="prev-btn" id="btn-prev" disabled aria-label="Previous">
  <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
</button>

<button class="fab" id="btn-next" aria-label="Next headline">
  <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
</button>

<div class="modal-bg" id="modal-topic">
  <div class="modal">
    <h3>Add a topic</h3>
    <div class="msub">A new lens on the news</div>
    <input type="text" id="topic-input" placeholder="e.g. Climate, Markets, AI…" maxlength="24">
    <div class="modal-acts">
      <button class="mbtn" id="btn-cancel-topic">Cancel</button>
      <button class="mbtn pri" id="btn-save-topic">Add Topic</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal-server">
  <div class="modal">
    <h3>Server URL</h3>
    <div class="msub">Your Railway deployment</div>
    <label class="field-lbl">Base URL (no trailing slash)</label>
    <input type="text" id="server-input" placeholder="https://your-app.up.railway.app" autocomplete="off" autocapitalize="off">
    <div class="modal-acts">
      <button class="mbtn" id="btn-clear-server">Clear</button>
      <button class="mbtn pri" id="btn-save-server">Save & Reload</button>
    </div>
  </div>
</div>

<script>
const DEFAULT_SERVER_URL = 'https://newviwe-production.up.railway.app';
const SERVER_KEY = 'dispatch_server_url_v1';
const TOPICS_KEY = 'dispatch_custom_topics_v1';
let SERVER_URL = localStorage.getItem(SERVER_KEY) || DEFAULT_SERVER_URL;

const DEFAULT_TOPICS = [
  {id:'top',name:'Top',url:'https://news.google.com/rss?hl=en-US&gl=US&ceid=US:en',rm:false},
  {id:'world',name:'World',url:'https://news.google.com/rss/headlines/section/topic/WORLD?hl=en-US&gl=US&ceid=US:en',rm:false},
  {id:'tech',name:'Tech',url:'https://news.google.com/rss/headlines/section/topic/TECHNOLOGY?hl=en-US&gl=US&ceid=US:en',rm:false},
  {id:'biz',name:'Business',url:'https://news.google.com/rss/headlines/section/topic/BUSINESS?hl=en-US&gl=US&ceid=US:en',rm:false},
  {id:'sci',name:'Science',url:'https://news.google.com/rss/headlines/section/topic/SCIENCE?hl=en-US&gl=US&ceid=US:en',rm:false}
];

let customTopics = (() => { try { return JSON.parse(localStorage.getItem(TOPICS_KEY)||'[]'); } catch{ return []; } })();
let allTopics = [...DEFAULT_TOPICS, ...customTopics];
let activeId = 'top';
let headlines = [];
let idx = 0;
let loading = false;
let transitioning = false;
const metaCache = new Map();

const bar = document.getElementById('bar');
const cardWrap = document.getElementById('card-wrap');
const cTopic = document.getElementById('c-topic');
const cPos = document.getElementById('c-pos');
const cSrc = document.getElementById('c-src');
const btnNext = document.getElementById('btn-next');
const btnPrev = document.getElementById('btn-prev');
const dateText = document.getElementById('date-text');
const clockText = document.getElementById('clock-text');
const topicsStrip = document.getElementById('topics-strip');
const modalTopic = document.getElementById('modal-topic');
const topicInput = document.getElementById('topic-input');
const modalServer = document.getElementById('modal-server');
const serverInput = document.getElementById('server-input');

function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function updateClock(){
  const n = new Date();
  dateText.innerText = n.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}).toUpperCase();
  clockText.innerText = n.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}
updateClock(); setInterval(updateClock,30000);

document.getElementById('brand-name').addEventListener('click',()=>{
  serverInput.value = SERVER_URL;
  modalServer.classList.add('open');
  setTimeout(()=>serverInput.focus(),80);
});
document.getElementById('btn-save-server').addEventListener('click',()=>{
  const v = serverInput.value.trim().replace(/\/+$/,'');
  if(v) localStorage.setItem(SERVER_KEY,v); else localStorage.removeItem(SERVER_KEY);
  location.reload();
});
document.getElementById('btn-clear-server').addEventListener('click',()=>{ serverInput.value=''; });
modalServer.addEventListener('click',e=>{ if(e.target===modalServer) modalServer.classList.remove('open'); });

function startBar(){ bar.classList.add('ind'); bar.style.right=''; }
function finishBar(){ bar.classList.remove('ind'); bar.style.right='0%'; setTimeout(()=>{ bar.style.right='100%'; },300); }
function setBar(p){ bar.classList.remove('ind'); bar.style.right=(100-p)+'%'; }

function renderTopics(){
  topicsStrip.innerHTML='';
  allTopics.forEach(t=>{
    const p = document.createElement('button');
    p.className='pill'+(t.id===activeId?' active':'');
    p.dataset.id=t.id;
    p.innerHTML=`<span>${esc(t.name)}</span>${t.rm?`<span class="rx" data-rm="1">×</span>`:''}`;
    p.addEventListener('click',e=>{
      if(e.target.dataset.rm){ e.stopPropagation(); removeTopic(t.id); return; }
      if(t.id!==activeId){ activeId=t.id; renderTopics(); fetchHeadlines(); }
    });
    topicsStrip.appendChild(p);
  });
  const add = document.createElement('button');
  add.className='pill add';
  add.innerHTML='+ ADD';
  add.addEventListener('click',()=>{ modalTopic.classList.add('open'); setTimeout(()=>topicInput.focus(),80); });
  topicsStrip.appendChild(add);
}

function removeTopic(id){
  customTopics = customTopics.filter(t=>t.id!==id);
  localStorage.setItem(TOPICS_KEY,JSON.stringify(customTopics));
  allTopics=[...DEFAULT_TOPICS,...customTopics];
  if(activeId===id){ activeId='top'; renderTopics(); fetchHeadlines(); } else renderTopics();
}

document.getElementById('btn-cancel-topic').addEventListener('click',()=>{ modalTopic.classList.remove('open'); topicInput.value=''; });
modalTopic.addEventListener('click',e=>{ if(e.target===modalTopic){ modalTopic.classList.remove('open'); topicInput.value=''; } });
document.getElementById('btn-save-topic').addEventListener('click',()=>{
  const name=topicInput.value.trim(); if(!name) return;
  const id='c_'+Date.now();
  const url=`https://news.google.com/rss/search?q=${encodeURIComponent(name)}&hl=en-US&gl=US&ceid=US:en`;
  customTopics.push({id,name,url,rm:true});
  localStorage.setItem(TOPICS_KEY,JSON.stringify(customTopics));
  allTopics=[...DEFAULT_TOPICS,...customTopics];
  activeId=id; topicInput.value=''; modalTopic.classList.remove('open'); renderTopics(); fetchHeadlines();
});
topicInput.addEventListener('keypress',e=>{ if(e.key==='Enter') document.getElementById('btn-save-topic').click(); });

function cleanTitle(t){ return t.replace(/\s+-\s+[^-]+$/,'').trim(); }
function extractSrc(it){
  const m=it.title.match(/\s-\s([^-]+)$/); if(m) return m[1].trim();
  if(it.source&&typeof it.source==='string') return it.source;
  if(it.author) return it.author; return 'Google News';
}
function stripTags(s){ return s.replace(/<[^>]+>/g,'').trim(); }
function timeAgo(d){
  const dt=new Date(d); if(isNaN(dt)) return '';
  const s=Math.floor((Date.now()-dt)/1000);
  if(s<60) return 'just now';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}

async function fetchHeadlines(){
  if(loading) return; loading=true;
  btnNext.disabled=true; btnPrev.disabled=true;
  const topic=allTopics.find(t=>t.id===activeId); if(!topic){ loading=false; return; }
  cTopic.innerText=topic.name.toUpperCase(); cPos.innerText='— / —'; cSrc.innerText='Loading…';
  cardWrap.innerHTML=`<div class="state-card"><div class="spinner"></div><div class="smsg">Gathering today's headlines…</div></div>`;
  startBar();
  try{
    let items=[];
    if(SERVER_URL){
      const r=await fetch(`${SERVER_URL}/feed?url=${encodeURIComponent(topic.url)}`);
      const d=await r.json(); if(d.items) items=d.items;
    } else {
      const r=await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(topic.url)}`);
      const d=await r.json();
      if(d.status==='ok'&&Array.isArray(d.items)){
        items=d.items.map(it=>({title:cleanTitle(it.title),link:it.link,pubDate:it.pubDate,source:extractSrc(it),description:stripTags(it.description||'')}));
      }
    }
    if(items.length>0){
      headlines=items.slice(0,30); idx=0; metaCache.clear();
      finishBar(); renderCard(true); prefetch(1); prefetch(2);
    } else {
      headlines=[]; finishBar();
      cardWrap.innerHTML=`<div class="state-card"><div class="sicon">!</div><div class="smsg">No headlines found for this topic.</div></div>`;
      cPos.innerText='0 / 0'; cSrc.innerText='No results';
    }
  } catch(err){
    console.error(err); headlines=[]; finishBar();
    cardWrap.innerHTML=`<div class="state-card"><div class="sicon">!</div><div class="smsg">Couldn't reach the wire. Check connection or server URL.</div></div>`;
    cPos.innerText='— / —'; cSrc.innerText='Offline';
  } finally { loading=false; updateCtrl(); }
}

async function fetchMeta(i){
  if(i<0||i>=headlines.length) return null;
  const h=headlines[i]; if(!h||!h.link) return null;
  if(metaCache.has(h.link)) return metaCache.get(h.link);
  if(!SERVER_URL){ const fb={image:'',description:h.description||'',resolvedUrl:h.link}; metaCache.set(h.link,fb); return fb; }
  try{
    const r=await fetch(`${SERVER_URL}/meta?url=${encodeURIComponent(h.link)}`);
    const d=await r.json();
    const m={image:d.image||'',description:d.description||h.description||'',resolvedUrl:d.resolvedUrl||h.link,siteName:d.siteName||''};
    metaCache.set(h.link,m); return m;
  } catch{ const fb={image:'',description:h.description||'',resolvedUrl:h.link}; metaCache.set(h.link,fb); return fb; }
}
function prefetch(i){ fetchMeta(i).catch(()=>{}); }

function renderCard(first=false){
  if(!headlines.length) return;
  const h=headlines[idx];
  const topic=allTopics.find(t=>t.id===activeId);
  cTopic.innerText=topic.name.toUpperCase();
  cPos.innerText=`${String(idx+1).padStart(2,'0')} / ${String(headlines.length).padStart(2,'0')}`;
  cSrc.innerText=h.source||'Wire';

  const tl=h.title.length;
  const hcls=tl>120?'xl':tl>75?'lg':'';
  const fl=(h.title||'D').trim().charAt(0).toUpperCase();

  const hero=SERVER_URL
    ?`<div class="card-hero" data-i="${idx}"><div class="hero-spin"></div></div>`
    :`<div class="card-hero no-img"><div class="fl">${esc(fl)}</div></div>`;

  const html=`
  <article class="card entering">
    ${hero}
    <div class="card-body">
      <div class="card-tag-row">
        <div class="stag">${esc(topic.name)}</div>
        <div class="snum">№${String(idx+1).padStart(3,'0')}</div>
      </div>
      <div class="hline"></div>
      <h1 class="headline ${hcls}">${esc(h.title)}</h1>
      <p class="desc" id="card-desc"></p>
      <a href="${esc(h.link)}" target="_blank" rel="noopener noreferrer" class="read-link" id="card-link">Read story →</a>
      <div class="src-row">
        <div class="src-name">— ${esc(h.source||'Wire')}</div>
        <div class="src-time">${timeAgo(h.pubDate)}</div>
      </div>
    </div>
  </article>`;

  if(first){
    cardWrap.innerHTML=html;
    hydrateCard(idx,fl);
  } else {
    const old=cardWrap.querySelector('.card');
    if(old){ old.classList.remove('entering'); old.classList.add('exiting'); setTimeout(()=>{ cardWrap.innerHTML=html; hydrateCard(idx,fl); },220); }
    else { cardWrap.innerHTML=html; hydrateCard(idx,fl); }
  }
}

async function hydrateCard(i,fl){
  if(!SERVER_URL) return;
  const m=await fetchMeta(i); if(idx!==i) return;
  const heroEl=cardWrap.querySelector('.card-hero');
  const descEl=document.getElementById('card-desc');
  const linkEl=document.getElementById('card-link');
  if(descEl){ if(m.description) descEl.innerText=m.description; else descEl.style.display='none'; }
  if(linkEl&&m.resolvedUrl) linkEl.href=m.resolvedUrl;
  if(heroEl){
    if(m.image){
      heroEl.innerHTML=`<img src="${esc(m.image.startsWith('/') ? SERVER_URL + m.image : m.image)}" alt="" referrerpolicy="no-referrer">`;
      const img=heroEl.querySelector('img');
      img.onload=()=>img.classList.add('loaded');
      img.onerror=()=>{ heroEl.classList.add('no-img'); heroEl.innerHTML=`<div class="fl">${esc(fl)}</div>`; };
    } else { heroEl.classList.add('no-img'); heroEl.innerHTML=`<div class="fl">${esc(fl)}</div>`; }
  }
  prefetch(i+1);
}

function nextHeadline(){
  if(!headlines.length||transitioning) return;
  transitioning=true;
  setBar(0); setTimeout(()=>setBar(40),40); setTimeout(()=>setBar(85),180);
  setTimeout(()=>{ idx=(idx+1)%headlines.length; renderCard(false); finishBar(); transitioning=false; updateCtrl(); },320);
}

function prevHeadline(){
  if(!headlines.length||transitioning||idx===0) return;
  transitioning=true;
  setBar(0); setTimeout(()=>setBar(70),80);
  setTimeout(()=>{ idx--; renderCard(false); finishBar(); transitioning=false; updateCtrl(); },280);
}

function updateCtrl(){
  btnNext.disabled=headlines.length===0;
  btnPrev.disabled=headlines.length===0||idx===0;
}

btnNext.addEventListener('click',nextHeadline);
btnPrev.addEventListener('click',prevHeadline);

document.addEventListener('keydown',e=>{
  if(modalTopic.classList.contains('open')||modalServer.classList.contains('open')) return;
  if(e.key==='ArrowRight'||e.key===' '){ e.preventDefault(); nextHeadline(); }
  if(e.key==='ArrowLeft') prevHeadline();
});

let tx=0;
cardWrap.addEventListener('touchstart',e=>{ tx=e.changedTouches[0].screenX; },{passive:true});
cardWrap.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].screenX-tx;
  if(Math.abs(dx)>55){ if(dx<0) nextHeadline(); else prevHeadline(); }
},{passive:true});

renderTopics();
fetchHeadlines();
</script>
</body>
</html>
