
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Dispatch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,400;9..144,0,700;9..144,0,900;9..144,1,400;9..144,1,700;9..144,1,900&family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0a;
  --paper:#1a1714;          /* deeper dim card */
  --paper2:#141110;
  --ink:#f0e6d2;            /* warm cream */
  --ink2:#a8a092;
  --ink3:#6b6358;
  --rule:#3a342b;
  --accent:#e0633e;
  --gold:#d4a955;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --font-serif:'Fraunces',Georgia,serif;
}
html,body{
  height:100dvh;width:100%;overflow:hidden;
  background:var(--bg);color:var(--ink);
  font-family:'Inter',sans-serif;
  overscroll-behavior:none;
  -webkit-font-smoothing:antialiased;
  touch-action:pan-y;
}
.app{
  height:100dvh;display:flex;flex-direction:column;
  padding-top:var(--safe-top);padding-bottom:var(--safe-bottom);
  position:relative;
}

/* Masthead */
.masthead{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 18px 8px;flex-shrink:0;
}
.brand-name{
  font-family:var(--font-serif);font-weight:900;font-size:30px;
  letter-spacing:-0.035em;color:var(--ink);cursor:pointer;
  line-height:1;font-variation-settings:"opsz" 144;
}
.brand-name .dot{color:var(--accent)}
.masthead-time{
  font-family:'JetBrains Mono',monospace;font-size:10px;
  color:var(--ink3);letter-spacing:0.08em;text-align:right;
  display:flex;flex-direction:column;gap:2px;
}
.live-dot{
  width:5px;height:5px;background:var(--accent);border-radius:50%;
  display:inline-block;margin-right:5px;
  animation:pulse 1.6s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* Topic strip — minimal */
.topic-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 18px 10px;flex-shrink:0;gap:12px;
}
.topic-current{display:flex;align-items:center;gap:10px;min-width:0}
.topic-current .tlabel{
  font-family:'JetBrains Mono',monospace;font-size:10px;
  color:var(--ink3);letter-spacing:0.18em;text-transform:uppercase;flex-shrink:0;
}
.topic-current .tname{
  font-family:'JetBrains Mono',monospace;font-weight:400;font-size:11px;
  color:var(--accent);letter-spacing:0.1em;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.topic-pos{
  font-family:'JetBrains Mono',monospace;font-size:14px;
  color:var(--ink2);letter-spacing:0.06em;flex-shrink:0;
}
.topic-pos .now{color:var(--accent);font-weight:700}
.topic-pos .sep,.topic-pos .total{color:var(--ink3);font-weight:400}

.bar-track{height:1px;background:rgba(240,230,210,0.06);flex-shrink:0;overflow:hidden;position:relative;margin:0 18px}
.bar-fill{position:absolute;inset:0 100% 0 0;background:linear-gradient(90deg,var(--accent),var(--gold));transition:right 0.4s ease}
.bar-fill.ind{inset:0;right:0;transform:translateX(-100%);animation:ind 1s cubic-bezier(0.4,0,0.2,1) infinite}
@keyframes ind{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

/* Stage */
.stage{flex:1;position:relative;overflow:hidden;padding:14px 14px 0;display:flex;flex-direction:column;min-height:0}
.card-wrap{position:relative;flex:1;perspective:1200px;min-height:0}

/* Card */
.card{
  position:absolute;inset:0;
  background:var(--paper);
  color:var(--ink);border-radius:14px;
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:
    0 30px 60px -15px rgba(0,0,0,0.8),
    0 10px 20px -5px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(240,230,210,0.04);
  border:1px solid rgba(240,230,210,0.05);
  cursor:grab;user-select:none;will-change:transform,opacity;
  isolation:isolate;
}
.card:active{cursor:grabbing}
.card.entering{animation:cin 0.5s cubic-bezier(0.2,0.8,0.2,1) forwards}
.card.exiting-left{animation:cout-l 0.35s cubic-bezier(0.6,0,0.8,0.3) forwards;pointer-events:none}
.card.exiting-right{animation:cout-r 0.35s cubic-bezier(0.6,0,0.8,0.3) forwards;pointer-events:none}
@keyframes cin{from{opacity:0;transform:translateX(40px) scale(0.96)}to{opacity:1;transform:translateX(0) scale(1)}}
@keyframes cout-l{from{opacity:1;transform:translateX(0) scale(1) rotate(0deg)}to{opacity:0;transform:translateX(-120%) scale(0.94) rotate(-6deg)}}
@keyframes cout-r{from{opacity:1;transform:translateX(0) scale(1) rotate(0deg)}to{opacity:0;transform:translateX(120%) scale(0.94) rotate(6deg)}}

/* Hero background image — bleeds right, fades to dark on left */
.hero-bg{
  position:absolute;inset:0;z-index:0;pointer-events:none;
  background:var(--paper);
  overflow:hidden;
}
.hero-bg img{
  position:absolute;top:0;right:0;
  width:100%;height:100%;object-fit:cover;
  opacity:0;transition:opacity 0.8s ease;
  filter:saturate(0.85) contrast(1.05);
}
.hero-bg img.loaded{opacity:0.85}
/* The left fade that makes text readable */
.hero-bg::after{
  content:'';position:absolute;inset:0;
  background:
    linear-gradient(90deg,var(--paper) 0%,var(--paper) 30%,rgba(26,23,20,0.92) 50%,rgba(26,23,20,0.55) 75%,rgba(26,23,20,0.25) 100%),
    linear-gradient(180deg,rgba(26,23,20,0.3) 0%,transparent 30%,transparent 70%,rgba(26,23,20,0.7) 100%);
  pointer-events:none;
}

.card-inner{
  position:relative;z-index:1;
  flex:1;padding:22px 20px 18px;
  display:flex;flex-direction:column;min-height:0;
}

/* Top row */
.card-top{
  display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-shrink:0;
}
.stag{
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:400;
  letter-spacing:0.04em;text-transform:lowercase;color:var(--accent);
  padding:4px 10px;border:1px solid var(--accent);border-radius:5px;
  background:rgba(224,99,62,0.05);
}
.snum{
  font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.08em;
  color:var(--ink2);margin-left:auto;flex-shrink:0;
}

/* Kicker */
.kicker{
  font-family:'JetBrains Mono',monospace;font-size:11px;
  color:var(--ink2);letter-spacing:0.05em;
  font-weight:400;margin-bottom:8px;
  display:flex;align-items:center;gap:8px;
  flex-shrink:0;
}
.kicker .dot{color:var(--ink3);opacity:0.6}
.accent-dash{
  width:36px;height:2px;background:var(--accent);
  margin-bottom:18px;flex-shrink:0;
}

/* Headline — auto-fit container */
.headline-wrap{
  flex:1;display:flex;flex-direction:column;justify-content:flex-start;
  min-height:0;overflow:hidden;
  position:relative;
}
.headline{
  font-family:var(--font-serif);font-weight:700;
  color:var(--ink);letter-spacing:-0.025em;
  line-height:0.97;
  font-variation-settings:"opsz" 144;
  text-wrap:balance;
  margin:0;
  font-size:48px; /* JS overwrites this */
}
.headline .first-phrase{color:var(--accent);font-weight:700;font-style:normal}
.headline .last-italic{color:var(--accent);font-style:italic;font-weight:900}

/* Description */
.desc{
  font-family:var(--font-serif);font-weight:400;
  font-size:13px;line-height:1.45;
  color:var(--ink2);
  margin-top:14px;flex-shrink:0;
  max-width:62%;
  display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;
}

/* Bottom row */
.src-row{
  display:flex;align-items:flex-end;justify-content:space-between;gap:12px;
  flex-shrink:0;margin-top:16px;
}
.src-name{
  font-family:var(--font-serif);font-style:italic;font-weight:700;
  font-size:16px;color:var(--ink);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  flex:1;letter-spacing:-0.005em;
}
.src-name::before{content:'— ';color:var(--ink2)}
.read-link{
  display:inline-flex;align-items:center;gap:6px;
  padding:11px 18px;background:var(--accent);color:#fff;border-radius:8px;
  text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:12px;
  font-weight:400;letter-spacing:0.02em;
  transition:background 0.2s ease,transform 0.15s ease;
  flex-shrink:0;
}
.read-link:hover{background:#c8421e;transform:translateY(-1px)}
.read-link:active{transform:translateY(0)}

/* Swipe hint overlays */
.swipe-hint{
  position:absolute;top:50%;transform:translateY(-50%);
  font-family:'JetBrains Mono',monospace;font-size:9px;
  letter-spacing:0.18em;text-transform:uppercase;
  color:var(--accent);opacity:0;pointer-events:none;
  transition:opacity 0.15s ease;font-weight:700;z-index:5;
}
.swipe-hint.left{left:18px}
.swipe-hint.right{right:18px}
.card.swiping-left .swipe-hint.left{opacity:1}
.card.swiping-right .swipe-hint.right{opacity:1}

/* State cards */
.state-card{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;
  color:var(--ink3);font-family:'JetBrains Mono',monospace;
  font-size:10px;letter-spacing:0.12em;padding:24px;text-align:center;
}
.state-card .sicon{font-family:var(--font-serif);font-size:64px;font-weight:900;color:var(--accent);opacity:0.8;line-height:1}
.state-card .smsg{
  font-family:var(--font-serif);font-style:italic;font-size:18px;font-weight:400;
  color:var(--ink);text-transform:none;letter-spacing:0;opacity:0.85;max-width:280px;line-height:1.4;
}
.spinner{width:36px;height:36px;border:2px solid rgba(240,230,210,0.1);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Footer hint */
.foot-hint{
  text-align:center;padding:14px 0 10px;
  font-family:'JetBrains Mono',monospace;font-size:11px;
  color:var(--ink3);letter-spacing:0.05em;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:10px;
}
.foot-hint .line{height:1px;background:var(--ink3);opacity:0.3;flex:0 0 50px}
.foot-hint span.accent{color:var(--accent)}

/* FAB */
.fab{
  position:fixed;right:18px;bottom:calc(18px + var(--safe-bottom));
  width:54px;height:54px;border-radius:50%;
  background:var(--accent);color:#fff;border:none;
  box-shadow:0 6px 24px rgba(224,99,62,0.5),0 2px 6px rgba(0,0,0,0.4);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:transform 0.2s cubic-bezier(0.2,0.8,0.2,1),background 0.15s ease;
  z-index:100;
}
.fab:hover{background:#c8421e;transform:scale(1.08) rotate(90deg)}
.fab:active{transform:scale(0.92)}
.fab svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.fab.open svg{transform:rotate(45deg);transition:transform 0.3s cubic-bezier(0.2,0.8,0.2,1)}

/* Topic Grid */
.grid-bg{
  position:fixed;inset:0;
  background:rgba(10,10,10,0.6);
  backdrop-filter:blur(20px) saturate(140%);
  -webkit-backdrop-filter:blur(20px) saturate(140%);
  display:none;z-index:200;padding:0;opacity:0;
  transition:opacity 0.3s ease;
}
.grid-bg.open{display:flex;align-items:flex-end;opacity:1}
.grid-sheet{
  width:100%;max-height:85vh;background:#0f0d0c;
  border-top-left-radius:24px;border-top-right-radius:24px;
  border-top:1px solid rgba(240,230,210,0.08);
  padding:20px 16px calc(100px + var(--safe-bottom));
  overflow-y:auto;transform:translateY(100%);
  transition:transform 0.4s cubic-bezier(0.2,0.8,0.2,1);position:relative;
}
.grid-bg.open .grid-sheet{transform:translateY(0)}
.grid-handle{width:38px;height:4px;background:rgba(240,230,210,0.2);border-radius:2px;margin:0 auto 16px}
.grid-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:18px;padding:0 6px}
.grid-title{
  font-family:var(--font-serif);font-weight:900;font-size:32px;
  letter-spacing:-0.035em;color:var(--ink);line-height:1;
  font-variation-settings:"opsz" 144;
}
.grid-sub{
  font-family:'JetBrains Mono',monospace;font-size:10px;
  letter-spacing:0.1em;color:var(--ink3);
}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}

.tile{
  position:relative;aspect-ratio:1.25/1;border-radius:12px;
  padding:10px 12px;
  display:flex;flex-direction:column;justify-content:space-between;
  cursor:pointer;border:1.5px solid transparent;overflow:hidden;
  transition:transform 0.18s ease,border-color 0.18s ease;color:#fff;
}
.tile:active{transform:scale(0.96)}
.tile.active{border-color:rgba(255,255,255,0.45)}
.tile.active::after{
  content:'●';position:absolute;top:8px;right:11px;
  font-size:10px;color:#fff;opacity:0.9;
  text-shadow:0 1px 4px rgba(0,0,0,0.4);
}
.tile-num{
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;
  letter-spacing:0.12em;opacity:0.7;
}
.tile-name{
  font-family:var(--font-serif);font-weight:900;
  font-size:11px;letter-spacing:0.04em;line-height:1.1;
  text-transform:uppercase;
}
.tile-rm{
  position:absolute;top:6px;right:6px;
  width:20px;height:20px;border-radius:50%;
  background:rgba(0,0,0,0.4);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;line-height:1;font-weight:700;
  border:none;cursor:pointer;z-index:2;
  opacity:0;transition:opacity 0.2s ease;
}
.tile:hover .tile-rm,.tile.show-rm .tile-rm{opacity:1}

.tile.add{
  background:transparent;
  border:1.5px dashed rgba(224,99,62,0.6);
  color:var(--accent);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:4px;
}
.tile.add .plus{font-size:28px;line-height:1;font-weight:300;font-family:'Inter',sans-serif}
.tile.add .lbl{
  font-family:'JetBrains Mono',monospace;font-size:11px;
  letter-spacing:0.12em;text-transform:uppercase;font-weight:700;
}

/* Modals */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,0.78);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  display:none;align-items:center;justify-content:center;z-index:1000;padding:20px;
}
.modal-bg.open{display:flex;animation:fin 0.2s ease}
@keyframes fin{from{opacity:0}to{opacity:1}}
.modal{
  width:100%;max-width:340px;background:#141414;
  border:1px solid rgba(240,230,210,0.1);border-radius:12px;padding:22px;
  animation:min 0.3s cubic-bezier(0.2,0.8,0.2,1);
}
@keyframes min{from{transform:translateY(16px) scale(0.96);opacity:0}to{transform:none;opacity:1}}
.modal h3{
  font-family:var(--font-serif);font-weight:900;font-size:26px;
  color:var(--ink);margin-bottom:2px;letter-spacing:-0.03em;line-height:1;
  font-variation-settings:"opsz" 144;
}
.modal .msub{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.1em;color:var(--ink3);margin-bottom:16px;margin-top:4px}
.modal input{
  width:100%;background:#0a0a0a;border:1px solid rgba(240,230,210,0.15);
  color:var(--ink);padding:11px 13px;border-radius:6px;
  font-family:'Inter',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s ease;
}
.modal input:focus{border-color:var(--accent)}
.modal-acts{display:flex;gap:8px;margin-top:16px}
.mbtn{
  flex:1;padding:11px;border:1px solid rgba(240,230,210,0.15);
  background:transparent;color:var(--ink);border-radius:6px;
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:400;
  letter-spacing:0.08em;cursor:pointer;transition:all 0.2s ease;
}
.mbtn:hover{background:rgba(240,230,210,0.05)}
.mbtn.pri{background:var(--accent);border-color:var(--accent);color:#fff}
.mbtn.pri:hover{background:#c8421e}
.field-lbl{display:block;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.1em;color:var(--ink3);margin:14px 0 6px}
</style>
</head>
<body>
<div class="app">
  <header class="masthead">
    <div class="brand-name" id="brand-name">Dispatch<span class="dot">.</span></div>
    <div class="masthead-time">
      <span id="date-text"></span>
      <span><span class="live-dot"></span><span id="clock-text"></span></span>
    </div>
  </header>

  <div class="topic-bar">
    <div class="topic-current">
      <span class="tlabel">READING</span>
      <span class="tname" id="t-name">top</span>
    </div>
    <div class="topic-pos"><span class="now" id="t-now">—</span> <span class="sep">/</span> <span class="total" id="t-total">—</span></div>
  </div>

  <div class="bar-track"><div class="bar-fill" id="bar"></div></div>

  <main class="stage">
    <div class="card-wrap" id="card-wrap">
      <div class="state-card"><div class="spinner"></div><div class="smsg">Gathering today's headlines…</div></div>
    </div>
    <div class="foot-hint">
      <span>swipe</span>
      <span class="line"></span>
      <span>back</span>
      <span class="accent">|</span>
      <span>next</span>
    </div>
  </main>
</div>

<button class="fab" id="fab" aria-label="Topics">
  <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</button>

<div class="grid-bg" id="grid-bg">
  <div class="grid-sheet" id="grid-sheet">
    <div class="grid-handle"></div>
    <div class="grid-head">
      <div class="grid-title">Topics</div>
      <div class="grid-sub">tap to switch</div>
    </div>
    <div class="grid" id="grid"></div>
  </div>
</div>

<div class="modal-bg" id="modal-topic">
  <div class="modal">
    <h3>Add a topic</h3>
    <div class="msub">A new lens on the news</div>
    <input type="text" id="topic-input" placeholder="e.g. Climate, Markets, AI…" maxlength="24">
    <div class="modal-acts">
      <button class="mbtn" id="btn-cancel-topic">Cancel</button>
      <button class="mbtn pri" id="btn-save-topic">Add Topic</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal-server">
  <div class="modal">
    <h3>Server URL</h3>
    <div class="msub">Your Railway deployment</div>
    <label class="field-lbl">Base URL (no trailing slash)</label>
    <input type="text" id="server-input" placeholder="https://your-app.up.railway.app" autocomplete="off" autocapitalize="off">
    <div class="modal-acts">
      <button class="mbtn" id="btn-clear-server">Clear</button>
      <button class="mbtn pri" id="btn-save-server">Save & Reload</button>
    </div>
  </div>
</div>

<script>
const DEFAULT_SERVER_URL = 'https://newviwe-production.up.railway.app';
const SERVER_KEY = 'dispatch_server_url_v1';
const TOPICS_KEY = 'dispatch_custom_topics_v1';
let SERVER_URL = localStorage.getItem(SERVER_KEY) || DEFAULT_SERVER_URL;

const DEFAULT_TOPICS = [
  {id:'top',name:'Top',url:'https://news.google.com/rss?hl=en-US&gl=US&ceid=US:en',rm:false},
  {id:'world',name:'World',url:'https://news.google.com/rss/headlines/section/topic/WORLD?hl=en-US&gl=US&ceid=US:en',rm:false},
  {id:'tech',name:'Tech',url:'https://news.google.com/rss/headlines/section/topic/TECHNOLOGY?hl=en-US&gl=US&ceid=US:en',rm:false},
  {id:'biz',name:'Business',url:'https://news.google.com/rss/headlines/section/topic/BUSINESS?hl=en-US&gl=US&ceid=US:en',rm:false},
  {id:'sci',name:'Science',url:'https://news.google.com/rss/headlines/section/topic/SCIENCE?hl=en-US&gl=US&ceid=US:en',rm:false}
];

const TILE_COLORS = [
  {bg:'linear-gradient(135deg,#b54327 0%,#7a2d18 100%)'},
  {bg:'linear-gradient(135deg,#1a3a5c 0%,#0d2238 100%)'},
  {bg:'linear-gradient(135deg,#a8822f 0%,#6b521d 100%)'},
  {bg:'linear-gradient(135deg,#264a35 0%,#152e1f 100%)'},
  {bg:'linear-gradient(135deg,#5c3450 0%,#33182c 100%)'},
  {bg:'linear-gradient(135deg,#36404f 0%,#1f2630 100%)'},
  {bg:'linear-gradient(135deg,#923f31 0%,#5a251b 100%)'},
  {bg:'linear-gradient(135deg,#244144 0%,#122326 100%)'},
  {bg:'linear-gradient(135deg,#4e3225 0%,#2f1e15 100%)'},
  {bg:'linear-gradient(135deg,#3f365c 0%,#231c3a 100%)'}
];

// Stop-words to skip when extracting an image keyword from a headline
const STOP_WORDS = new Set([
  'the','a','an','and','or','but','of','in','on','at','to','for','with','by','from','as','is','are','was','were','be','been','being','have','has','had','do','does','did','will','would','could','should','may','might','can','this','that','these','those','it','its','his','her','their','our','your','my','i','he','she','we','they','you','what','which','who','whom','whose','where','when','why','how','if','than','then','so','no','not','only','also','very','more','most','some','any','all','about','after','before','over','under','out','up','down','one','two','three','first','second','last','new','old','says','said','say','tells','told','reports','report','reveals','announced','vs','&','—','-','|','—'
]);

function extractKeywords(title, n=2){
  const cleaned = title
    .replace(/[''""]/g,'')
    .replace(/[^\p{L}\p{N}\s]/gu,' ')
    .toLowerCase()
    .split(/\s+/)
    .filter(w=>w && w.length>2 && !STOP_WORDS.has(w));
  // Take first n meaningful words to preserve context
  const picks = cleaned.slice(0,n);
  if(picks.length===0) return 'news';
  return picks.join(',');
}

function imageUrl(title,seed){
  const kw = extractKeywords(title);
  // LoremFlickr — no key required, keyword search, lock for deterministic image per headline
  return `https://loremflickr.com/900/1200/${encodeURIComponent(kw)}?lock=${seed}`;
}

let customTopics = (() => { try { return JSON.parse(localStorage.getItem(TOPICS_KEY)||'[]'); } catch{ return []; } })();
let allTopics = [...DEFAULT_TOPICS, ...customTopics];
let activeId = 'top';
let headlines = [];
let idx = 0;
let loading = false;
let transitioning = false;

const bar = document.getElementById('bar');
const cardWrap = document.getElementById('card-wrap');
const tName = document.getElementById('t-name');
const tNow = document.getElementById('t-now');
const tTotal = document.getElementById('t-total');
const fab = document.getElementById('fab');
const dateText = document.getElementById('date-text');
const clockText = document.getElementById('clock-text');
const gridBg = document.getElementById('grid-bg');
const gridEl = document.getElementById('grid');
const modalTopic = document.getElementById('modal-topic');
const topicInput = document.getElementById('topic-input');
const modalServer = document.getElementById('modal-server');
const serverInput = document.getElementById('server-input');

function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function updateClock(){
  const n = new Date();
  dateText.innerText = n.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  clockText.innerText = n.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',hour12:false});
}
updateClock(); setInterval(updateClock,30000);

document.getElementById('brand-name').addEventListener('click',()=>{
  serverInput.value = SERVER_URL;
  modalServer.classList.add('open');
  setTimeout(()=>serverInput.focus(),80);
});
document.getElementById('btn-save-server').addEventListener('click',()=>{
  const v = serverInput.value.trim().replace(/\/+$/,'');
  if(v) localStorage.setItem(SERVER_KEY,v); else localStorage.removeItem(SERVER_KEY);
  location.reload();
});
document.getElementById('btn-clear-server').addEventListener('click',()=>{ serverInput.value=''; });
modalServer.addEventListener('click',e=>{ if(e.target===modalServer) modalServer.classList.remove('open'); });

function startBar(){ bar.classList.add('ind'); bar.style.right=''; }
function finishBar(){ bar.classList.remove('ind'); bar.style.right='0%'; setTimeout(()=>{ bar.style.right='100%'; },300); }
function setBar(p){ bar.classList.remove('ind'); bar.style.right=(100-p)+'%'; }

fab.addEventListener('click',()=>{
  if(gridBg.classList.contains('open')) closeGrid();
  else openGrid();
});

function openGrid(){ renderGrid(); gridBg.classList.add('open'); fab.classList.add('open'); }
function closeGrid(){ gridBg.classList.remove('open'); fab.classList.remove('open'); }
gridBg.addEventListener('click',e=>{ if(e.target===gridBg) closeGrid(); });

function renderGrid(){
  gridEl.innerHTML='';
  allTopics.forEach((t,i)=>{
    const color = TILE_COLORS[i % TILE_COLORS.length];
    const tile = document.createElement('div');
    tile.className = 'tile' + (t.id===activeId?' active':'') + (t.rm?' show-rm':'');
    tile.style.background = color.bg;
    tile.innerHTML = `
      ${t.rm?`<button class="tile-rm" data-rm-id="${esc(t.id)}" aria-label="Remove">×</button>`:''}
      <div class="tile-num">№ ${String(i+1).padStart(2,'0')}</div>
      <div class="tile-name">${esc(t.name)}</div>
    `;
    tile.addEventListener('click',e=>{
      if(e.target.dataset.rmId){ e.stopPropagation(); removeTopic(e.target.dataset.rmId); return; }
      if(t.id!==activeId){ activeId = t.id; closeGrid(); fetchHeadlines(); }
      else closeGrid();
    });
    gridEl.appendChild(tile);
  });

  const add = document.createElement('div');
  add.className = 'tile add';
  add.innerHTML = `<div class="plus">+</div><div class="lbl">Add Topic</div>`;
  add.addEventListener('click',()=>{
    closeGrid();
    setTimeout(()=>{ modalTopic.classList.add('open'); setTimeout(()=>topicInput.focus(),80); },200);
  });
  gridEl.appendChild(add);
}

function removeTopic(id){
  customTopics = customTopics.filter(t=>t.id!==id);
  localStorage.setItem(TOPICS_KEY,JSON.stringify(customTopics));
  allTopics=[...DEFAULT_TOPICS,...customTopics];
  if(activeId===id){ activeId='top'; renderGrid(); fetchHeadlines(); } else renderGrid();
}

document.getElementById('btn-cancel-topic').addEventListener('click',()=>{ modalTopic.classList.remove('open'); topicInput.value=''; });
modalTopic.addEventListener('click',e=>{ if(e.target===modalTopic){ modalTopic.classList.remove('open'); topicInput.value=''; } });
document.getElementById('btn-save-topic').addEventListener('click',()=>{
  const name=topicInput.value.trim(); if(!name) return;
  const id='c_'+Date.now();
  const url=`https://news.google.com/rss/search?q=${encodeURIComponent(name)}&hl=en-US&gl=US&ceid=US:en`;
  customTopics.push({id,name,url,rm:true});
  localStorage.setItem(TOPICS_KEY,JSON.stringify(customTopics));
  allTopics=[...DEFAULT_TOPICS,...customTopics];
  activeId=id; topicInput.value=''; modalTopic.classList.remove('open');
  fetchHeadlines();
});
topicInput.addEventListener('keypress',e=>{ if(e.key==='Enter') document.getElementById('btn-save-topic').click(); });

function cleanTitle(t){ return t.replace(/\s+-\s+[^-]+$/,'').trim(); }
function extractSrc(it){
  const m=it.title.match(/\s-\s([^-]+)$/); if(m) return m[1].trim();
  if(it.source&&typeof it.source==='string') return it.source;
  if(it.author) return it.author; return 'Google News';
}
function stripTags(s){ return s.replace(/<[^>]+>/g,'').trim(); }
function timeAgo(d){
  const dt=new Date(d); if(isNaN(dt)) return '';
  const s=Math.floor((Date.now()-dt)/1000);
  if(s<60) return 'just now';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}

async function fetchHeadlines(){
  if(loading) return; loading=true;
  const topic=allTopics.find(t=>t.id===activeId); if(!topic){ loading=false; return; }
  tName.innerText=topic.name.toLowerCase(); tNow.innerText='—'; tTotal.innerText='—';
  cardWrap.innerHTML=`<div class="state-card"><div class="spinner"></div><div class="smsg">Gathering today's headlines…</div></div>`;
  startBar();
  try{
    let items=[];
    if(SERVER_URL){
      const r=await fetch(`${SERVER_URL}/feed?url=${encodeURIComponent(topic.url)}`);
      const d=await r.json(); if(d.items) items=d.items;
    } else {
      const r=await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(topic.url)}`);
      const d=await r.json();
      if(d.status==='ok'&&Array.isArray(d.items)){
        items=d.items.map(it=>({title:cleanTitle(it.title),link:it.link,pubDate:it.pubDate,source:extractSrc(it),description:stripTags(it.description||'')}));
      }
    }
    if(items.length>0){
      headlines=items.slice(0,30); idx=0;
      finishBar(); renderCard(true);
    } else {
      headlines=[]; finishBar();
      cardWrap.innerHTML=`<div class="state-card"><div class="sicon">!</div><div class="smsg">No headlines found for this topic.</div></div>`;
      tNow.innerText='0'; tTotal.innerText='0';
    }
  } catch(err){
    console.error(err); headlines=[]; finishBar();
    cardWrap.innerHTML=`<div class="state-card"><div class="sicon">!</div><div class="smsg">Couldn't reach the wire. Tap the logo to check your server URL.</div></div>`;
    tNow.innerText='—'; tTotal.innerText='—';
  } finally { loading=false; }
}

/**
 * Split headline into 3 parts for visual hierarchy:
 *   - first phrase (~first 1-3 words, accent color, roman)
 *   - middle (cream, roman)
 *   - last word/phrase (accent italic)
 * Designed so even short titles get the editorial 3-tone treatment.
 */
function styleHeadline(title){
  const words = title.trim().split(/\s+/);
  if(words.length <= 2){
    // Very short — just last word italic
    const first = words.slice(0,-1).join(' ');
    const last = words[words.length-1];
    return `${first?`<span class="first-phrase">${esc(first)}</span> `:''}<span class="last-italic">${esc(last)}</span>`;
  }
  // Determine split points
  let firstCount, lastCount;
  if(words.length <= 5){ firstCount = 1; lastCount = 1; }
  else if(words.length <= 9){ firstCount = 2; lastCount = 1; }
  else if(words.length <= 14){ firstCount = 2; lastCount = 2; }
  else { firstCount = 3; lastCount = 2; }

  // Try to make the last italic group end at a sentence end or natural noun
  // Bias: if title ends in punctuation strip and re-add
  let endPunct = '';
  let lastWord = words[words.length-1];
  const punctMatch = lastWord.match(/^(.+?)([.!?,;:]+)$/);
  if(punctMatch){ words[words.length-1] = punctMatch[1]; endPunct = punctMatch[2]; }

  const firstPart = words.slice(0, firstCount).join(' ');
  const midPart = words.slice(firstCount, words.length - lastCount).join(' ');
  const lastPart = words.slice(words.length - lastCount).join(' ');

  return `<span class="first-phrase">${esc(firstPart)}</span> ${esc(midPart)} <span class="last-italic">${esc(lastPart)}${esc(endPunct)}</span>`;
}

/**
 * Auto-fit headline to fill the available container vertical space.
 * Binary-search font size between 22px and 84px.
 */
function fitHeadline(el, container){
  const maxH = container.clientHeight;
  if(maxH <= 0) return;
  let lo = 22, hi = 84, best = lo;
  // Try a few iterations of binary search
  for(let i=0;i<14;i++){
    const mid = (lo + hi) / 2;
    el.style.fontSize = mid + 'px';
    // Force reflow
    const h = el.scrollHeight;
    if(h <= maxH - 4){ best = mid; lo = mid; }
    else { hi = mid; }
    if(hi - lo < 0.5) break;
  }
  el.style.fontSize = best.toFixed(1) + 'px';
}

function renderCard(first=false){
  if(!headlines.length) return;
  const h=headlines[idx];
  const topic=allTopics.find(t=>t.id===activeId);
  tName.innerText=topic.name.toLowerCase();
  tNow.innerText=String(idx+1).padStart(2,'0');
  tTotal.innerText=String(headlines.length).padStart(2,'0');

  const styledTitle = styleHeadline(h.title);
  const desc = h.description ? esc(h.description.substring(0,180)) : '';
  const imgSrc = imageUrl(h.title, idx + 1);
  // Use the title's primary source name as the byline (extracted earlier)
  const srcDomain = (h.source||'wire').toLowerCase().replace(/\s+/g,'');

  const html=`
  <article class="card entering">
    <div class="hero-bg">
      <img src="${imgSrc}" alt="" referrerpolicy="no-referrer" loading="eager" decoding="async">
    </div>
    <div class="swipe-hint left">← back</div>
    <div class="swipe-hint right">next →</div>
    <div class="card-inner">
      <div class="card-top">
        <div class="stag">${esc(srcDomain)}</div>
        <div class="snum">${String(idx+1).padStart(3,'0')} / ${String(headlines.length).padStart(3,'0')}</div>
      </div>
      <div class="kicker">dispatch <span class="dot">·</span> the wire</div>
      <div class="accent-dash"></div>
      <div class="headline-wrap" id="hl-wrap">
        <h1 class="headline" id="hl">${styledTitle}</h1>
      </div>
      ${desc?`<p class="desc">${desc}</p>`:''}
      <div class="src-row">
        <div class="src-name">${esc(h.source||'Wire')}</div>
        <a href="${esc(h.link)}" target="_blank" rel="noopener noreferrer" class="read-link">read →</a>
      </div>
    </div>
  </article>`;

  cardWrap.innerHTML=html;

  // Image loaded handler
  const img = cardWrap.querySelector('.hero-bg img');
  if(img){
    img.addEventListener('load',()=>img.classList.add('loaded'),{once:true});
    img.addEventListener('error',()=>{
      // Silent fail — gradient background remains
      img.remove();
    },{once:true});
  }

  // Auto-fit headline AFTER layout
  requestAnimationFrame(()=>{
    const wrap = document.getElementById('hl-wrap');
    const hl = document.getElementById('hl');
    if(wrap && hl) fitHeadline(hl, wrap);
  });

  attachSwipe();
}

// Refit on resize
let resizeTimer;
window.addEventListener('resize',()=>{
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(()=>{
    const wrap = document.getElementById('hl-wrap');
    const hl = document.getElementById('hl');
    if(wrap && hl){ hl.style.fontSize=''; fitHeadline(hl, wrap); }
  },120);
});

let dragStartX=0, dragStartY=0, dragging=false, dragDx=0, dragDy=0;
let currentCard=null;

function attachSwipe(){
  currentCard = cardWrap.querySelector('.card');
  if(!currentCard) return;
  currentCard.addEventListener('touchstart',onDragStart,{passive:true});
  currentCard.addEventListener('touchmove',onDragMove,{passive:false});
  currentCard.addEventListener('touchend',onDragEnd);
  currentCard.addEventListener('touchcancel',onDragEnd);
  currentCard.addEventListener('mousedown',onDragStart);
}

function onDragStart(e){
  if(transitioning) return;
  const t = e.touches ? e.touches[0] : e;
  if(e.target.closest('.read-link')) return;
  dragStartX = t.clientX; dragStartY = t.clientY;
  dragging = true; dragDx = 0; dragDy = 0;
  if(e.type==='mousedown'){
    document.addEventListener('mousemove',onDragMove);
    document.addEventListener('mouseup',onDragEnd);
  }
}

function onDragMove(e){
  if(!dragging||!currentCard) return;
  const t = e.touches ? e.touches[0] : e;
  dragDx = t.clientX - dragStartX;
  dragDy = t.clientY - dragStartY;

  if(Math.abs(dragDy) > Math.abs(dragDx) && Math.abs(dragDy) > 14){ cancelDrag(); return; }
  if(Math.abs(dragDx) > 10) e.preventDefault?.();

  let dx = dragDx;
  if(idx===0 && dx>0) dx = dx * 0.3;

  const rot = dx / 22;
  const op = 1 - Math.min(Math.abs(dx)/520, 0.35);
  currentCard.style.transform = `translateX(${dx}px) rotate(${rot}deg)`;
  currentCard.style.opacity = op;

  if(dx < -30){ currentCard.classList.add('swiping-right'); currentCard.classList.remove('swiping-left'); }
  else if(dx > 30 && idx>0){ currentCard.classList.add('swiping-left'); currentCard.classList.remove('swiping-right'); }
  else { currentCard.classList.remove('swiping-left','swiping-right'); }
}

function onDragEnd(){
  if(!dragging) return;
  document.removeEventListener('mousemove',onDragMove);
  document.removeEventListener('mouseup',onDragEnd);
  const threshold = 80;
  if(dragDx < -threshold){ dragging=false; nextHeadline(); }
  else if(dragDx > threshold && idx>0){ dragging=false; prevHeadline(); }
  else { cancelDrag(); }
}

function cancelDrag(){
  dragging=false;
  if(currentCard){
    currentCard.style.transition='transform 0.25s cubic-bezier(0.2,0.8,0.2,1), opacity 0.25s ease';
    currentCard.style.transform=''; currentCard.style.opacity='';
    currentCard.classList.remove('swiping-left','swiping-right');
    setTimeout(()=>{ if(currentCard) currentCard.style.transition=''; },280);
  }
  document.removeEventListener('mousemove',onDragMove);
  document.removeEventListener('mouseup',onDragEnd);
}

function nextHeadline(){
  if(!headlines.length||transitioning) return;
  transitioning=true;
  const card = cardWrap.querySelector('.card');
  if(card){ card.style.transition=''; card.classList.remove('entering','swiping-left','swiping-right'); card.classList.add('exiting-left'); }
  setBar(0); setTimeout(()=>setBar(85),120);
  setTimeout(()=>{ idx=(idx+1)%headlines.length; renderCard(false); finishBar(); transitioning=false; },340);
}

function prevHeadline(){
  if(!headlines.length||transitioning||idx===0) return;
  transitioning=true;
  const card = cardWrap.querySelector('.card');
  if(card){ card.style.transition=''; card.classList.remove('entering','swiping-left','swiping-right'); card.classList.add('exiting-right'); }
  setBar(0); setTimeout(()=>setBar(85),120);
  setTimeout(()=>{ idx--; renderCard(false); finishBar(); transitioning=false; },340);
}

document.addEventListener('keydown',e=>{
  if(modalTopic.classList.contains('open')||modalServer.classList.contains('open')||gridBg.classList.contains('open')){
    if(e.key==='Escape'){
      if(gridBg.classList.contains('open')) closeGrid();
      if(modalTopic.classList.contains('open')) modalTopic.classList.remove('open');
      if(modalServer.classList.contains('open')) modalServer.classList.remove('open');
    }
    return;
  }
  if(e.key==='ArrowRight'||e.key===' '){ e.preventDefault(); nextHeadline(); }
  if(e.key==='ArrowLeft') prevHeadline();
});

fetchHeadlines();
</script>
