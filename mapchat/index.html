
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>MapChat</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
<meta name="theme-color" content="#111"/>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#111;--card:#1e1e1e;--border:#2a2a2a;
  --text:#f0f0f0;--muted:#666;
  --accent:#f5e642;--green:#4ade80;
  --bar-h:64px;
  font-family:'DM Sans',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);}

.topbar{
  position:fixed;top:0;left:0;right:0;height:50px;
  background:var(--bg);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 14px;z-index:600;
}
.logo{font-weight:600;font-size:17px;letter-spacing:-.4px;}
.logo span{color:var(--accent);}
.online-pill{
  margin-left:auto;display:flex;align-items:center;gap:6px;
  background:var(--card);border:1px solid var(--border);
  border-radius:999px;padding:5px 11px 5px 9px;font-size:12px;color:var(--muted);
}
.odot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;}
#onlineCount{font-weight:600;color:var(--text);}

#map{
  position:fixed;top:50px;left:0;right:0;
  bottom:calc(var(--bar-h) + env(safe-area-inset-bottom));
}

.msg-bar{
  position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--bar-h) + env(safe-area-inset-bottom));
  padding:8px 12px calc(8px + env(safe-area-inset-bottom));
  background:var(--bg);border-top:1px solid var(--border);
  display:flex;align-items:center;gap:8px;z-index:600;
}
.loc-btn{
  width:48px;height:48px;flex-shrink:0;border-radius:12px;
  background:var(--card);border:1px solid var(--border);
  cursor:pointer;display:grid;place-items:center;color:var(--muted);transition:all .15s;
}
.loc-btn.on{border-color:var(--accent);color:var(--accent);}
.loc-btn:active{transform:scale(.93);}
.loc-btn svg{width:20px;height:20px;fill:currentColor;}
.msg-input{
  flex:1;height:48px;background:var(--card);border:1px solid var(--border);
  border-radius:12px;color:var(--text);font-family:'DM Sans',sans-serif;
  font-size:15px;padding:0 14px;outline:none;
}
.msg-input::placeholder{color:var(--muted);}
.msg-input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(245,230,66,.12);}
.send-btn{
  width:48px;height:48px;flex-shrink:0;border-radius:12px;
  background:var(--accent);border:none;cursor:pointer;
  display:grid;place-items:center;transition:transform .1s,opacity .1s;
}
.send-btn:active{transform:scale(.93);}
.send-btn:disabled{opacity:.35;cursor:not-allowed;}
.send-btn svg{width:20px;height:20px;fill:#111;}

/* SPLASH */
.splash{
  position:fixed;inset:0;background:var(--bg);z-index:900;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:20px;padding:36px 28px;text-align:center;
}
.splash-icon{font-size:52px;line-height:1;}
.splash h1{font-size:27px;font-weight:600;line-height:1.25;}
.splash h1 span{color:var(--accent);}
.splash p{font-size:15px;color:var(--muted);line-height:1.65;max-width:290px;}
.splash-btn{
  background:var(--accent);color:#111;font-family:'DM Sans',sans-serif;
  font-size:16px;font-weight:600;border:none;cursor:pointer;
  border-radius:14px;padding:15px 0;width:100%;max-width:280px;transition:transform .1s;
}
.splash-btn:active{transform:scale(.97);}
.splash-note{font-size:12px;color:var(--muted);}

/* POPUP */
.maplibregl-popup-content{
  background:#fefce8 !important;
  border:1.5px solid #c9b800 !important;
  border-radius:10px !important;
  padding:9px 11px !important;
  box-shadow:0 3px 14px rgba(0,0,0,.28) !important;
  font-family:'DM Sans',sans-serif !important;
  min-width:0 !important;max-width:200px !important;
}
.maplibregl-popup-tip{border-top-color:#c9b800 !important;}
.maplibregl-popup-close-button{
  color:#888 !important;font-size:16px !important;
  top:3px !important;right:4px !important;padding:0 5px !important;line-height:1.4 !important;
}
.maplibregl-ctrl-attrib{display:none !important;}
.maplibregl-canvas{touch-action:none;}

.pop-msg{font-size:14px;font-weight:500;color:#1a1800;line-height:1.4;word-break:break-word;padding-right:12px;}
.pop-empty{font-size:13px;color:#9a8600;font-style:italic;}
.pop-time{font-size:11px;color:#9a8600;margin-top:4px;font-weight:400;}

/* MARKER — plain dot only, no text */
.umarker{
  width:16px;height:16px;border-radius:50%;
  background:var(--accent);border:2.5px solid #fff;
  box-shadow:0 1px 6px rgba(0,0,0,.5);
  cursor:pointer;position:relative;
}
.umarker.me{background:var(--green);}
.umarker .ping{
  position:absolute;inset:-5px;border-radius:50%;
  border:2px solid var(--accent);opacity:0;
  animation:ping 2.8s ease-out infinite;
}
.umarker.me .ping{border-color:var(--green);}
@keyframes ping{0%{transform:scale(.8);opacity:.7;}100%{transform:scale(2.2);opacity:0;}}

/* TOAST */
.toast{
  position:fixed;top:58px;left:50%;
  transform:translateX(-50%) translateY(-6px);
  background:var(--card);border:1px solid var(--border);border-radius:999px;
  padding:7px 16px;font-size:13px;color:var(--text);z-index:700;
  opacity:0;pointer-events:none;transition:all .22s;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="splash" id="splash">
  <div class="splash-icon">🗺️</div>
  <h1>Welcome to <span>MapChat</span></h1>
  <p>Share your location and drop a message. See who's around you in real time.</p>
  <button class="splash-btn" id="shareLocBtn">Share my location</button>
  <div class="splash-note">No account needed · removed when you leave</div>
</div>

<header class="topbar">
  <div class="logo">Map<span>Chat</span></div>
  <div class="online-pill">
    <div class="odot"></div>
    <span id="onlineCount">0</span>&nbsp;online
  </div>
</header>

<div id="map"></div>

<div class="msg-bar">
  <button class="loc-btn" id="locateBtn" title="Centre on me">
    <svg viewBox="0 0 24 24"><path d="M12 8a4 4 0 1 1 0 8 4 4 0 0 1 0-8zm0-6a1 1 0 0 1 1 1v1.07A9 9 0 0 1 20.93 11H22a1 1 0 0 1 0 2h-1.07A9 9 0 0 1 13 20.93V22a1 1 0 0 1-2 0v-1.07A9 9 0 0 1 3.07 13H2a1 1 0 0 1 0-2h1.07A9 9 0 0 1 11 3.07V2a1 1 0 0 1 1-1zm0 4a7 7 0 1 0 0 14A7 7 0 0 0 12 6z"/></svg>
  </button>
  <input class="msg-input" id="msgInput" type="text" placeholder="Type a message…" maxlength="140" autocomplete="off"/>
  <button class="send-btn" id="sendBtn" disabled>
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, onValue, set, serverTimestamp, onDisconnect }
  from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const app = initializeApp({
  apiKey:"AIzaSyD_c9jMxAA6dtyk_EXAHnH09OEAoalUADA",
  authDomain:"trackingclients.firebaseapp.com",
  databaseURL:"https://trackingclients-default-rtdb.firebaseio.com/",
  projectId:"trackingclients",
  storageBucket:"trackingclients.appspot.com",
  messagingSenderId:"27490943622",
  appId:"1:27490943622:web:d6c87547aa5df440508707"
}, 'mapChatApp2');
const db = getDatabase(app);
const USERS = 'mapchat/users';

/* session */
let myId = localStorage.getItem('mapchat_id2');
if (!myId) {
  myId = 'mc_' + Date.now().toString(36) + Math.random().toString(36).slice(2,5);
  localStorage.setItem('mapchat_id2', myId);
}

let map, myLat=null, myLng=null, myMsg='', myRef=null;
const markers  = new Map();
const userData = new Map();

const splash      = document.getElementById('splash');
const shareLocBtn = document.getElementById('shareLocBtn');
const msgInput    = document.getElementById('msgInput');
const sendBtn     = document.getElementById('sendBtn');
const locateBtn   = document.getElementById('locateBtn');
const onlineEl    = document.getElementById('onlineCount');
const toastEl     = document.getElementById('toast');

let toastT;
function toast(t, ms=2400){
  toastEl.textContent=t; toastEl.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>toastEl.classList.remove('show'),ms);
}

function fmtTs(ts){
  if(!ts) return '';
  const d=new Date(ts), p=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* popup: just message + datetime, super compact */
function mkPopup(data){
  const msg  = (data.msg||'').trim();
  const time = fmtTs(data.ts);
  if (!msg) return `<div class="pop-empty">No message yet</div>`;
  return `<div class="pop-msg">${esc(msg)}</div>${time?`<div class="pop-time">${time}</div>`:''}`;
}

/* marker = plain dot, zero text */
function mkEl(isMe){
  const d=document.createElement('div');
  d.className='umarker'+(isMe?' me':'');
  d.innerHTML='<div class="ping"></div>';
  return d;
}

function upsert(uid, data){
  const isMe=uid===myId;
  const lngLat=[data.lng,data.lat];
  if(markers.has(uid)){
    const {marker,popup}=markers.get(uid);
    marker.setLngLat(lngLat);
    popup.setHTML(mkPopup(data)); // always refresh
  } else {
    const el=mkEl(isMe);
    const popup=new maplibregl.Popup({offset:[0,-12],closeButton:true,closeOnClick:false,maxWidth:'200px'})
      .setHTML(mkPopup(data));
    const marker=new maplibregl.Marker({element:el,anchor:'center'})
      .setLngLat(lngLat).setPopup(popup).addTo(map);
    el.addEventListener('click',()=>{
      popup.setHTML(mkPopup(userData.get(uid)||data));
      marker.togglePopup();
    });
    markers.set(uid,{marker,popup});
  }
}

function drop(uid){
  if(!markers.has(uid))return;
  const {marker,popup}=markers.get(uid);
  popup.remove(); marker.remove();
  markers.delete(uid); userData.delete(uid);
}

function listenUsers(){
  onValue(ref(db,USERS), snap=>{
    const live=new Set();
    if(snap.exists()){
      snap.forEach(child=>{
        const uid=child.key, d=child.val();
        if(!d||typeof d.lat!=='number')return;
        live.add(uid);
        userData.set(uid,{...d,id:uid});
        upsert(uid,{...d,id:uid});
      });
    }
    markers.forEach((_,uid)=>{ if(!live.has(uid)) drop(uid); });
    onlineEl.textContent=live.size;
  });
}

async function pushMe(msg){
  if(myLat===null)return;
  if(!myRef){ myRef=ref(db,`${USERS}/${myId}`); onDisconnect(myRef).remove(); }
  const p={lat:myLat,lng:myLng,ts:serverTimestamp()};
  if(msg!==undefined) p.msg=msg;
  else if(myMsg) p.msg=myMsg;
  await set(myRef,p);
}

function startWatch(){
  if(!navigator.geolocation){toast('Geolocation not supported');return;}
  navigator.geolocation.watchPosition(
    pos=>{ myLat=pos.coords.latitude; myLng=pos.coords.longitude; pushMe(); locateBtn.classList.add('on'); sendBtn.disabled=false; },
    err=>toast('Location: '+err.message),
    {enableHighAccuracy:true,timeout:10000,maximumAge:4000}
  );
}

locateBtn.addEventListener('click',()=>{
  if(myLat!==null) map.flyTo({center:[myLng,myLat],zoom:Math.max(map.getZoom(),15),duration:600});
  else toast('Location not ready yet');
});

async function send(){
  const text=msgInput.value.trim();
  if(!text||myLat===null)return;
  sendBtn.disabled=true;
  try{
    myMsg=text;
    // Optimistic local update so popup shows immediately without waiting for Firebase round-trip
    const now=Date.now();
    const updated={lat:myLat,lng:myLng,msg:text,ts:now,id:myId};
    userData.set(myId,updated);
    if(markers.has(myId)){
      const {marker,popup}=markers.get(myId);
      popup.setHTML(mkPopup(updated));
      if(!popup.isOpen()) marker.togglePopup();
    }
    msgInput.value='';
    // Then persist
    await pushMe(text);
    toast('Sent ✓');
  }catch(e){
    toast('Failed to send');
  }finally{
    sendBtn.disabled=(myLat===null);
  }
}

sendBtn.addEventListener('click',send);
msgInput.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();send();}});

async function initMap(){
  map=new maplibregl.Map({
    container:'map',
    style:{version:8,
      sources:{osm:{type:'raster',
        tiles:['https://a.tile.openstreetmap.org/{z}/{x}/{y}.png','https://b.tile.openstreetmap.org/{z}/{x}/{y}.png'],
        tileSize:256}},
      layers:[{id:'osm',type:'raster',source:'osm',
        paint:{'raster-saturation':-0.4,'raster-brightness-max':0.75}}]
    },
    center:[4.35,50.85],zoom:13,maxZoom:19,attributionControl:false,fadeDuration:0
  });
  return new Promise(res=>map.on('load',res));
}

shareLocBtn.addEventListener('click',async()=>{
  shareLocBtn.textContent='Getting location…'; shareLocBtn.disabled=true;
  try{
    const pos=await new Promise((res,rej)=>
      navigator.geolocation.getCurrentPosition(res,rej,{enableHighAccuracy:true,timeout:10000})
    );
    myLat=pos.coords.latitude; myLng=pos.coords.longitude;
    await initMap();
    map.flyTo({center:[myLng,myLat],zoom:15,duration:800});
    listenUsers(); startWatch();
    splash.style.transition='opacity .28s'; splash.style.opacity='0';
    setTimeout(()=>{splash.style.display='none';},290);
  }catch(e){
    shareLocBtn.textContent='Try again'; shareLocBtn.disabled=false;
    toast('Could not get location — check permissions');
  }
});
</script>
</body>
</html>
