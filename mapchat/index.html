<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>RotiPani — Post Deal</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
<meta name="theme-color" content="#fff"/>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:     #f7f7f7;
  --white:  #ffffff;
  --border: #e0e0e0;
  --border2:#c8c8c8;
  --text:   #111111;
  --t2:     #555555;
  --t3:     #999999;
  --green:  #1a7a4a;
  --green2: #eaf4ee;
  --green3: #c2dece;
  --red:    #cc2200;

  --top:  42px;
  --bot:  52px;
  --f:    11px;
  --f10:  10px;
  --font: 'Inter', system-ui, sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);font-size:var(--f);-webkit-font-smoothing:antialiased;}

/* ── TOPBAR ── */
.topbar{
  position:fixed;top:0;left:0;right:0;
  height:var(--top);
  background:var(--white);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 10px;gap:8px;
  z-index:600;
}
.brand{display:flex;align-items:center;gap:6px;}
.brand-icon{
  width:24px;height:24px;border-radius:6px;
  background:var(--green);
  display:grid;place-items:center;
  font-size:13px;flex-shrink:0;
}
.brand-name{font-size:var(--f);font-weight:700;letter-spacing:-.2px;}
.brand-name em{color:var(--green);font-style:normal;}
.brand-tag{
  font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;
  color:var(--t3);border:1px solid var(--border);border-radius:4px;
  padding:1px 5px;
}
.userpill{
  margin-left:auto;
  display:flex;align-items:center;gap:5px;
  border:1px solid var(--border);border-radius:999px;
  padding:4px 8px 4px 5px;cursor:pointer;background:var(--white);
}
.userpill-av{
  width:20px;height:20px;border-radius:50%;
  background:var(--green2);border:1px solid var(--green3);
  display:grid;place-items:center;font-size:11px;flex-shrink:0;
}
.userpill-name{
  font-size:10px;font-weight:600;color:var(--t2);
  max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

/* ── MAP ── */
#map{
  position:fixed;
  top:var(--top);left:0;right:0;
  bottom:calc(var(--bot) + env(safe-area-inset-bottom,0px));
}

/* ── BOTTOM BAR ── */
.bottombar{
  position:fixed;left:0;right:0;bottom:0;
  height:calc(var(--bot) + env(safe-area-inset-bottom,0px));
  padding:8px 10px calc(8px + env(safe-area-inset-bottom,0px));
  background:var(--white);
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  z-index:650;
}
.btn-post{
  width:100%;max-width:420px;height:36px;
  border:none;border-radius:7px;
  background:var(--green);color:#fff;
  font-family:var(--font);font-size:var(--f);font-weight:600;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.btn-post:active{opacity:.85;}
.btn-post:disabled{opacity:.35;cursor:not-allowed;}

/* ── DIMMER ── */
.dimmer{
  position:fixed;inset:0;
  background:rgba(0,0,0,.3);
  z-index:800;
  display:none;
}
.dimmer.on{display:block;}

/* ── SHEET — keyboard-safe ──
   Sheet sits at the bottom of the visual viewport.
   JS moves it up when the keyboard appears via visualViewport. */
.sheet{
  position:fixed;
  left:0;right:0;
  z-index:900;
  background:var(--white);
  border-top:1px solid var(--border2);
  border-radius:12px 12px 0 0;
  /* bottom set by JS; default off-screen */
  bottom:-100%;
  transition:bottom .22s cubic-bezier(.4,0,.2,1);
  max-height:92vh;
  display:flex;flex-direction:column;
  overflow:hidden;
}
.sheet.open{ bottom:0; }

.sh-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 10px 8px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.sh-head-left{}
.sh-eyebrow{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--green);margin-bottom:2px;}
.sh-title{font-size:var(--f);font-weight:700;color:var(--text);}
.sh-sub{font-size:10px;color:var(--t3);margin-top:1px;}
.btn-x{
  width:28px;height:28px;border-radius:6px;
  background:var(--bg);border:1px solid var(--border);
  color:var(--t3);cursor:pointer;font-size:16px;line-height:1;
  display:grid;place-items:center;flex-shrink:0;
}
.btn-x:active{background:var(--border);}

.sh-body{
  padding:10px;
  display:flex;flex-direction:column;gap:9px;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  flex:1;
}

.sh-foot{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 10px calc(8px + env(safe-area-inset-bottom,0px));
  border-top:1px solid var(--border);
  flex-shrink:0;
  background:var(--white);
}
.step-pips{display:flex;gap:4px;align-items:center;}
.pip{width:5px;height:5px;border-radius:50%;background:var(--border2);}
.pip.on{background:var(--green);width:14px;border-radius:3px;}
.foot-btns{display:flex;gap:6px;}

.btn-back{
  height:32px;padding:0 12px;border-radius:6px;
  border:1px solid var(--border2);background:var(--white);
  color:var(--t2);font-family:var(--font);font-size:var(--f);font-weight:600;
  cursor:pointer;
}
.btn-back:active{background:var(--bg);}
.btn-back:disabled{opacity:.35;cursor:not-allowed;}

.btn-next{
  height:32px;padding:0 14px;border-radius:6px;
  border:none;background:var(--green);
  color:#fff;font-family:var(--font);font-size:var(--f);font-weight:600;
  cursor:pointer;display:flex;align-items:center;gap:5px;
}
.btn-next:active{opacity:.85;}
.btn-next:disabled{opacity:.35;cursor:not-allowed;}

/* ── FORM ELEMENTS ── */
.f-label{
  font-size:10px;font-weight:600;color:var(--t2);
  margin-bottom:4px;display:flex;align-items:center;gap:4px;
}
.f-req{color:var(--green);}
.f-input{
  width:100%;
  border:1px solid var(--border2);
  border-radius:6px;
  background:var(--bg);
  color:var(--text);font-family:var(--font);
  font-size:var(--f);
  padding:7px 9px;
  outline:none;
  line-height:1.35;
}
.f-input:focus{border-color:var(--green);background:var(--white);}
.f-input::placeholder{color:var(--t3);}
textarea.f-input{min-height:64px;resize:none;}
.f-hint{font-size:10px;color:var(--t3);margin-top:3px;line-height:1.4;}

.infobox{
  display:flex;align-items:center;gap:7px;
  background:var(--green2);border:1px solid var(--green3);
  border-radius:6px;padding:7px 9px;
}
.infobox-ico{font-size:14px;flex-shrink:0;}
.infobox-txt{font-size:10px;color:var(--t2);line-height:1.45;}
.infobox-mono{font-size:10px;font-weight:700;color:var(--green);}

.price-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

.review-box{
  border:1px solid var(--border);border-radius:6px;
  overflow:hidden;
}
.rev-row{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:6px 9px;gap:8px;
}
.rev-row+.rev-row{border-top:1px solid var(--border);}
.rev-k{font-size:10px;color:var(--t3);font-weight:500;white-space:nowrap;}
.rev-v{font-size:10px;color:var(--text);font-weight:600;text-align:right;}
.rev-v.green{color:var(--green);}
.price-pair{display:flex;align-items:center;gap:5px;}
.p-orig{font-size:10px;color:var(--t3);text-decoration:line-through;}
.p-disc{font-size:10px;font-weight:700;color:var(--green);}

/* ── TOAST ── */
.toast{
  position:fixed;top:calc(var(--top) + 8px);left:50%;
  transform:translateX(-50%) translateY(-4px);
  background:var(--text);color:#fff;
  border-radius:999px;padding:6px 14px;
  font-size:10px;font-weight:600;
  z-index:9999;opacity:0;pointer-events:none;
  transition:all .18s ease;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{background:var(--green);}
.toast.err{background:var(--red);}

/* ── MAP OVERRIDES ── */
.maplibregl-ctrl-attrib{display:none!important;}
.maplibregl-canvas{touch-action:none;}
.maplibregl-popup{pointer-events:auto;}
.maplibregl-popup-content{
  background:var(--white)!important;
  border:1px solid var(--border2)!important;
  border-radius:8px!important;
  padding:9px 10px!important;
  font-family:var(--font)!important;
  max-width:200px!important;
}
.maplibregl-popup-tip{border-top-color:var(--border2)!important;}
.maplibregl-popup-close-button{
  color:var(--t3)!important;font-size:16px!important;
  top:2px!important;right:5px!important;
}
.pop-chip{
  display:inline-block;background:var(--green2);color:var(--green);
  font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  border-radius:4px;padding:2px 6px;margin-bottom:5px;
  border:1px solid var(--green3);
}
.pop-title{font-size:11px;font-weight:700;color:var(--text);line-height:1.2;}
.pop-sub{font-size:10px;color:var(--t2);margin-top:3px;line-height:1.4;}
.pop-prices{
  display:flex;align-items:center;gap:5px;
  margin-top:6px;padding-top:6px;border-top:1px solid var(--border);
}
.pop-orig{font-size:10px;color:var(--t3);text-decoration:line-through;}
.pop-disc{font-size:11px;font-weight:700;color:var(--green);}
.pop-arr{font-size:9px;color:var(--t3);}
.pop-meta{font-size:9px;color:var(--t3);margin-top:4px;}

/* markers */
.rmarker{
  width:30px;height:30px;border-radius:50%;
  background:var(--white);border:2px solid var(--green);
  cursor:pointer;position:relative;display:grid;place-items:center;
  font-size:14px;
}
.rmarker.me{border-color:var(--text);}
.rmarker .ping{
  position:absolute;inset:-5px;border-radius:50%;
  border:1.5px solid var(--green);opacity:0;
  animation:ping 3s ease-out infinite;
}
@keyframes ping{0%{transform:scale(.8);opacity:.55;}100%{transform:scale(2.2);opacity:0;}}
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="brand">
    <div class="brand-icon">🍛</div>
    <div class="brand-name">Roti<em>Pani</em></div>

<!-- ══ WIZARD SHEET ══ -->
<div class="sheet" id="wizardSheet">

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, onValue, set, update, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const app = initializeApp({
  apiKey:"AIzaSyD_c9jMxAA6dtyk_EXAHnH09OEAoalUADA",
  authDomain:"trackingclients.firebaseapp.com",
  databaseURL:"https://trackingclients-default-rtdb.firebaseio.com/",
  projectId:"trackingclients",
  storageBucket:"trackingclients.appspot.com",
  messagingSenderId:"27490943622",
  appId:"1:27490943622:web:d6c87547aa5df440508707"
},"rotiPaniPost3");

const db = getDatabase(app);
const USERS = "rotipani/restaurantsV2";

let map, myLat=null, myLng=null, watchId=null;
let myUsername = localStorage.getItem("rp_username")||"";
let myId       = localStorage.getItem("rp_uid")||"";

const markers  = new Map();
const restData = new Map();

/* ── DOM ── */
const $ = id => document.getElementById(id);
const openWizardBtn = $("openWizardBtn");
const userLabel     = $("userLabel");
const userPill      = $("userPill");
const dimmer        = $("dimmer");
const toastEl       = $("toast");

const loginSheet    = $("loginSheet");
const closeLoginBtn = $("closeLoginBtn");
const usernameInput = $("usernameInput");
const emailPreview  = $("emailPreview");
const loginBtn      = $("loginBtn");
const logoutBtn     = $("logoutBtn");

const wizardSheet   = $("wizardSheet");
const closeWizardBtn= $("closeWizardBtn");
const stepEyebrow   = $("stepEyebrow");
const stepTitle     = $("stepTitle");
const stepSub       = $("stepSub");
const stepBody      = $("stepBody");
const stepPips      = $("stepPips");
const backBtn       = $("backBtn");
const nextBtn       = $("nextBtn");

/* ── Sheet open/close — keyboard-safe ──
   We position each sheet with CSS bottom:0 / bottom:-100%.
   When a sheet opens, we also attach a visualViewport listener so
   when the software keyboard appears the sheet slides up above it. */
let activeSheet = null;
let vpListener  = null;

function adjustForKeyboard(sheet) {
  if(!window.visualViewport) return;
  const vv = window.visualViewport;
  // distance keyboard has pushed up from bottom
  const kbHeight = window.innerHeight - vv.height - vv.offsetTop;
  sheet.style.bottom = Math.max(0, kbHeight) + "px";
}

function openSheet(sheet) {
  if(activeSheet && activeSheet !== sheet) closeSheet(activeSheet);
  activeSheet = sheet;
  dimmer.classList.add("on");
  sheet.classList.add("open");
  sheet.style.bottom = "0px";

  if(window.visualViewport) {
    if(vpListener) window.visualViewport.removeEventListener("resize", vpListener);
    vpListener = () => adjustForKeyboard(sheet);
    window.visualViewport.addEventListener("resize", vpListener);
  }
}
function closeSheet(sheet) {
  if(!sheet) return;
  sheet.classList.remove("open");
  sheet.style.bottom = "";
  dimmer.classList.remove("on");
  if(vpListener && window.visualViewport) {
    window.visualViewport.removeEventListener("resize", vpListener);
    vpListener = null;
  }
  activeSheet = null;
}

/* ── Toast ── */
let toastT;
function toast(msg, type="", ms=2400) {
  toastEl.textContent = msg;
  toastEl.className = "toast show" + (type?" "+type:"");
  clearTimeout(toastT);
  toastT = setTimeout(()=>toastEl.className="toast", ms);
}

/* ── Helpers ── */
function cleanUsername(u){
  return String(u||"").trim().toLowerCase()
    .replace(/[^a-z0-9._]/g,"").replace(/^\.+/,"").slice(0,24);
}
const emailFromUsername = u => u?`${u}@rotipani.net`:"";
const uidFromUsername   = u => u?`rp_${u}`:"";
const digitsOnly        = s => String(s||"").replace(/\D/g,"");
function normalizeWa(local){
  let d=digitsOnly(local);
  if(d.startsWith("0")) d=d.slice(1);
  return d?`92${d.slice(0,10)}`:"";
}
function esc(s){
  return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function fmtTs(ms){
  if(!ms) return "";
  const d=new Date(ms); if(isNaN(d)) return "";
  const p=n=>String(n).padStart(2,"0");
  return `${p(d.getDate())}/${p(d.getMonth()+1)} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

/* ── Popup HTML ── */
function mkPopup(d){
  const title=(d.dealTitle||"").trim()||(d.restName||"").trim()||"Deal";
  const desc=(d.dealDesc||"").trim();
  const op=(d.origPrice??"").toString().trim();
  const dp=(d.discPrice??"").toString().trim();
  const time=d.tsClient?fmtTs(d.tsClient):"";
  return `
    <div class="pop-chip">🏷 Deal</div>
    <div class="pop-title">${esc(title)}</div>
    ${desc?`<div class="pop-sub">${esc(desc)}</div>`:""}
    ${op||dp?`<div class="pop-prices">
      ${op?`<span class="pop-orig">PKR ${esc(op)}</span><span class="pop-arr">→</span>`:""}
      ${dp?`<span class="pop-disc">PKR ${esc(dp)}</span>`:""}
    </div>`:""}
    ${time?`<div class="pop-meta">${esc(time)}</div>`:""}
  `;
}

/* ── Markers ── */
function mkEl(isMe){
  const d=document.createElement("div");
  d.className="rmarker"+(isMe?" me":"");
  d.innerHTML=`<div class="ping"></div>${isMe?"📍":"🍽️"}`;
  return d;
}
function upsert(uid, data){
  const lngLat=[data.lng,data.lat];
  if(markers.has(uid)){
    const {marker,popup}=markers.get(uid);
    marker.setLngLat(lngLat);
    popup.setLngLat(lngLat).setHTML(mkPopup(data));
    if(!popup.isOpen()) popup.addTo(map);
    return;
  }
  const el=mkEl(uid===myId);
  const popup=new maplibregl.Popup({offset:[0,-18],closeButton:uid===myId,closeOnClick:false,maxWidth:"200px"})
    .setHTML(mkPopup(data)).setLngLat(lngLat).addTo(map);
  const marker=new maplibregl.Marker({element:el,anchor:"center"}).setLngLat(lngLat).addTo(map);
  el.addEventListener("click",()=>{
    const latest=restData.get(uid)||data;
    popup.setHTML(mkPopup(latest));
    if(!popup.isOpen()) popup.setLngLat(lngLat).addTo(map);
  });
  markers.set(uid,{marker,popup});
}
function drop(uid){
  const m=markers.get(uid); if(!m) return;
  m.popup.remove(); m.marker.remove();
  markers.delete(uid); restData.delete(uid);
}
function listenRestaurants(){
  onValue(ref(db,USERS),snap=>{
    const live=new Set();
    if(snap.exists()) snap.forEach(child=>{
      const uid=child.key, d=child.val();
      if(!d||typeof d.lat!=="number"||typeof d.lng!=="number") return;
      live.add(uid);
      const merged={...d,id:uid};
      restData.set(uid,merged); upsert(uid,merged);
    });
    for(const uid of markers.keys()) if(!live.has(uid)) drop(uid);
  });
}

/* ── Map ── */
async function initMap(){
  map=new maplibregl.Map({
    container:"map",
    style:{version:8,sources:{osm:{type:"raster",
      tiles:["https://a.tile.openstreetmap.org/{z}/{x}/{y}.png","https://b.tile.openstreetmap.org/{z}/{x}/{y}.png"],
      tileSize:256}},
      layers:[{id:"osm",type:"raster",source:"osm",
        paint:{"raster-saturation":-.18,"raster-brightness-max":.92,"raster-brightness-min":.1,"raster-contrast":.06}
      }]
    },
    center:[4.35,50.85],zoom:13,maxZoom:19,attributionControl:false,fadeDuration:0
  });
  await new Promise(res=>map.on("load",res));
}
async function updateMyLocation(){
  if(!myId||myLat==null||myLng==null) return;
  await update(ref(db,`${USERS}/${myId}`),{lat:myLat,lng:myLng,lastSeen:serverTimestamp()});
}
function startWatch(){
  if(!navigator.geolocation){toast("Geolocation not supported","err");return;}
  if(watchId!=null) return;
  watchId=navigator.geolocation.watchPosition(
    async pos=>{
      myLat=pos.coords.latitude; myLng=pos.coords.longitude;
      openWizardBtn.disabled=!(myId&&myLat!=null);
      try{await updateMyLocation();}catch{}
    },
    err=>toast("Location: "+err.message,"err"),
    {enableHighAccuracy:true,timeout:10000,maximumAge:4000}
  );
}

/* ── Auth UI ── */
function refreshUserUI(){
  userLabel.textContent = myUsername?emailFromUsername(myUsername):"Sign in";
  emailPreview.textContent = myUsername?emailFromUsername(myUsername):"—";
  logoutBtn.style.display = myId?"flex":"none";
  openWizardBtn.disabled  = !(myId&&myLat!=null);
}
function ensureLogin(){
  if(!myId){
    usernameInput.value=cleanUsername(myUsername);
    openSheet(loginSheet);
    setTimeout(()=>usernameInput.focus(),120);
    return false;
  }
  return true;
}

usernameInput.addEventListener("input",()=>{
  usernameInput.value=cleanUsername(usernameInput.value);
  emailPreview.textContent=emailFromUsername(usernameInput.value);
});
usernameInput.addEventListener("keydown", e=>{
  if(e.key==="Enter"){ e.preventDefault(); loginBtn.click(); }
});

loginBtn.addEventListener("click", async ()=>{
  const u=cleanUsername(usernameInput.value);
  if(!u){toast("Enter a username","err");return;}
  myUsername=u; myId=uidFromUsername(u);
  localStorage.setItem("rp_username",myUsername);
  localStorage.setItem("rp_uid",myId);
  closeSheet(loginSheet);
  toast("Signed in as "+emailFromUsername(myUsername),"ok");
  refreshUserUI();
  try{
    await update(ref(db,`${USERS}/${myId}`),{username:myUsername,email:emailFromUsername(myUsername),lastSeen:serverTimestamp()});
    await updateMyLocation();
  }catch{toast("DB error","err");}
});
logoutBtn.addEventListener("click",()=>{
  localStorage.removeItem("rp_username"); localStorage.removeItem("rp_uid");
  myUsername=""; myId=""; refreshUserUI(); closeSheet(loginSheet); toast("Signed out");
});

closeLoginBtn.addEventListener("click",()=>closeSheet(loginSheet));
dimmer.addEventListener("click",()=>{ if(activeSheet) closeSheet(activeSheet); });
userPill.addEventListener("click",()=>{ openSheet(loginSheet); setTimeout(()=>usernameInput.focus(),120); });

/* ── Wizard ── */
const wz={step:0,data:{restName:"",dealTitle:"",dealDesc:"",origPrice:"",discPrice:"",waLocal:""}};

const steps=[
  {
    eyebrow:"Step 1 of 4",title:"Restaurant Info",sub:"Name shown on the map popup",
    render(){return `
      <div class="infobox">
        <div class="infobox-ico">👤</div>
        <div class="infobox-txt">Signed in as <span class="infobox-mono">${esc(emailFromUsername(myUsername))}</span></div>
      </div>
      <div>
        <div class="f-label">Restaurant name <span class="f-req">*</span></div>
        <input class="f-input" id="s_rn" placeholder="Al Rehman Restaurant" value="${esc(wz.data.restName)}" autocomplete="off"/>
      </div>
    `;},
    afterRender(){setTimeout(()=>$("s_rn")?.focus(),80);},
    read(){wz.data.restName=$("s_rn").value.trim();},
    validate(){return wz.data.restName?"":"Restaurant name is required";}
  },
  {
    eyebrow:"Step 2 of 4",title:"Deal Title",sub:"Short catchy headline",
    render(){return `
      <div>
        <div class="f-label">Deal title <span class="f-req">*</span></div>
        <input class="f-input" id="s_ti" placeholder="Biryani Friday Special" value="${esc(wz.data.dealTitle)}" maxlength="60" autocomplete="off"/>
        <div class="f-hint">Max 60 characters</div>
      </div>
    `;},
    afterRender(){setTimeout(()=>$("s_ti")?.focus(),80);},
    read(){wz.data.dealTitle=$("s_ti").value.trim();},
    validate(){return wz.data.dealTitle?"":"Deal title is required";}
  },
  {
    eyebrow:"Step 3 of 4",title:"Description & Prices",sub:"Offer details and PKR pricing",
    render(){return `
      <div>
        <div class="f-label">Description <span class="f-req">*</span></div>
        <textarea class="f-input" id="s_de" placeholder="Chicken biryani + raita…" maxlength="180">${esc(wz.data.dealDesc)}</textarea>
      </div>
      <div class="price-row">
        <div>
          <div class="f-label">Original PKR <span class="f-req">*</span></div>
          <input class="f-input" id="s_op" inputmode="numeric" placeholder="800" value="${esc(wz.data.origPrice)}"/>
        </div>
        <div>
          <div class="f-label">Deal PKR <span class="f-req">*</span></div>
          <input class="f-input" id="s_dp" inputmode="numeric" placeholder="550" value="${esc(wz.data.discPrice)}"/>
        </div>
      </div>
    `;},
    afterRender(){setTimeout(()=>$("s_de")?.focus(),80);},
    read(){
      wz.data.dealDesc=$("s_de").value.trim();
      wz.data.origPrice=digitsOnly($("s_op").value);
      wz.data.discPrice=digitsOnly($("s_dp").value);
    },
    validate(){
      if(!wz.data.dealDesc) return "Description required";
      if(!wz.data.origPrice) return "Original price required";
      if(!wz.data.discPrice) return "Deal price required";
      if(Number(wz.data.discPrice)>=Number(wz.data.origPrice)) return "Deal price must be less than original";
      return "";
    }
  },
  {
    eyebrow:"Step 4 of 4",title:"WhatsApp & Review",sub:"Confirm before posting",
    render(){
      const wa=normalizeWa(wz.data.waLocal);
      const sv=wz.data.origPrice&&wz.data.discPrice?Number(wz.data.origPrice)-Number(wz.data.discPrice):null;
      return `
        <div>
          <div class="f-label">WhatsApp number <span class="f-req">*</span></div>
          <input class="f-input" id="s_wa" inputmode="numeric" placeholder="03452233450" value="${esc(wz.data.waLocal)}"/>
          <div class="f-hint">+92 added automatically → <strong>${esc(wa||"92…")}</strong></div>
        </div>
        <div class="review-box">
          <div class="rev-row"><span class="rev-k">Restaurant</span><span class="rev-v">${esc(wz.data.restName)}</span></div>
          <div class="rev-row"><span class="rev-k">Deal</span><span class="rev-v">${esc(wz.data.dealTitle)}</span></div>
          <div class="rev-row">
            <span class="rev-k">Price</span>
            <div class="price-pair">
              <span class="p-orig">PKR ${esc(wz.data.origPrice)}</span>
              <span class="p-disc">PKR ${esc(wz.data.discPrice)}</span>
            </div>
          </div>
          ${sv?`<div class="rev-row"><span class="rev-k">Saving</span><span class="rev-v green">PKR ${sv}</span></div>`:""}
        </div>
      `;
    },
    afterRender(){
      setTimeout(()=>$("s_wa")?.focus(),80);
      $("s_wa").addEventListener("input",e=>{e.target.value=digitsOnly(e.target.value).slice(0,11);});
    },
    read(){wz.data.waLocal=$("s_wa").value.trim();},
    validate(){
      const wa=normalizeWa(wz.data.waLocal);
      if(!wa) return "WhatsApp number required";
      if(wa.length<11) return "Number too short";
      return "";
    }
  }
];

function updatePips(){
  stepPips.querySelectorAll(".pip").forEach((p,i)=>p.classList.toggle("on",i===wz.step));
}
function renderStep(){
  const s=steps[wz.step];
  stepEyebrow.textContent=s.eyebrow;
  stepTitle.textContent=s.title;
  stepSub.textContent=s.sub;
  stepBody.innerHTML=s.render();
  backBtn.disabled=wz.step===0;
  nextBtn.textContent=wz.step===steps.length-1?"Post Deal →":"Next →";
  updatePips();
  if(typeof s.afterRender==="function") s.afterRender();
  stepBody.scrollTop=0;
}

function openWizard(){
  if(!ensureLogin()) return;
  openSheet(wizardSheet);
  wz.step=0; renderStep();
}
function closeWizard(){ closeSheet(wizardSheet); }

backBtn.addEventListener("click",()=>{
  steps[wz.step].read();
  if(wz.step>0){wz.step--;renderStep();}
});
nextBtn.addEventListener("click", async ()=>{
  const s=steps[wz.step];
  s.read();
  const err=s.validate();
  if(err){toast(err,"err");return;}
  if(wz.step<steps.length-1){wz.step++;renderStep();return;}

  if(myLat==null||myLng==null){toast("Location not ready","err");return;}
  const payload={
    username:myUsername,email:emailFromUsername(myUsername),
    restName:wz.data.restName,dealTitle:wz.data.dealTitle,dealDesc:wz.data.dealDesc,
    origPrice:wz.data.origPrice,discPrice:wz.data.discPrice,
    whatsapp:normalizeWa(wz.data.waLocal),
    lat:myLat,lng:myLng,
    ts:serverTimestamp(),tsClient:Date.now(),lastSeen:serverTimestamp()
  };
  nextBtn.disabled=true;
  try{
    restData.set(myId,{...payload,id:myId});
    upsert(myId,{...payload,id:myId});
    await set(ref(db,`${USERS}/${myId}`),payload);
    toast("Deal posted!","ok",3000);
    closeWizard();
  }catch{toast("Failed to post","err");}
  finally{nextBtn.disabled=false;}
});

openWizardBtn.addEventListener("click",openWizard);
closeWizardBtn.addEventListener("click",closeWizard);

/* ── Boot ── */
(async function boot(){
  await initMap();
  listenRestaurants();
  startWatch();
  myUsername=cleanUsername(myUsername);
  if(myUsername) myId=uidFromUsername(myUsername);
  refreshUserUI();
  if(!myId) { openSheet(loginSheet); setTimeout(()=>usernameInput.focus(),180); }
})();
</script>
</body>
</html>
