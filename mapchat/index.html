<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>RotiPani — Post Deal</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0a1f0e" />
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<style>
:root{
  --bg:#0a1f0e;
  --surface:#0f2613;
  --card:#132c17;
  --card2:#162f1a;
  --border:#1d3b24;
  --border2:#2a5c34;
  --text:#eef6ef;
  --muted:#77a282;
  --muted2:#5f8c6b;
  --green:#22c55e;
  --danger:#ef4444;

  --top-h:50px;
  --bar-h:68px;

  --radius:16px;
  --radius-sm:12px;
  --shadow:0 10px 28px rgba(0,0,0,.42);
  --font: 'DM Sans', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);}

#map{
  position:fixed;
  top:var(--top-h); left:0; right:0;
  bottom:calc(var(--bar-h) + env(safe-area-inset-bottom));
}

/* Topbar */
.topbar{
  position:fixed;top:0;left:0;right:0;height:var(--top-h);
  background:rgba(10,31,14,.92);
  backdrop-filter:saturate(150%) blur(10px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 12px;z-index:600;gap:10px;
}
.brand{display:flex;align-items:center;gap:8px;min-width:0;}
.brand .icon{
  width:30px;height:30px;border-radius:10px;background:var(--green);
  display:grid;place-items:center;font-size:16px;flex-shrink:0;
  box-shadow:0 10px 20px rgba(34,197,94,.18);
}
.brand .name{font-weight:800;font-size:15px;letter-spacing:-.2px;white-space:nowrap;}
.brand .name span{color:var(--green);}
.userpill{
  margin-left:auto;
  display:flex;align-items:center;gap:6px;
  border:1px solid var(--border2);
  background:linear-gradient(180deg, rgba(22,47,26,.9), rgba(15,38,19,.9));
  border-radius:999px;
  padding:5px 10px;
  font-size:11px;color:var(--muted);
  min-width:0;
}
.userpill b{color:var(--text);font-size:11px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;}

/* Bottom bar: only centered button */
.bottom{
  position:fixed;left:0;right:0;bottom:0;z-index:650;
  height:calc(var(--bar-h) + env(safe-area-inset-bottom));
  padding:10px 12px calc(12px + env(safe-area-inset-bottom));
  background:rgba(10,31,14,.92);
  backdrop-filter:saturate(150%) blur(10px);
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
}
.primary{
  width:min(420px, 92vw);
  height:48px;
  border-radius:14px;
  border:none;
  background:var(--green);
  color:#061a0a;
  font-weight:900;
  font-size:14px;
  cursor:pointer;
  transition:transform .1s ease, opacity .15s ease;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.primary:active{transform:scale(.99);}
.primary:disabled{opacity:.35;cursor:not-allowed;}

/* Sheets */
.overlay{
  position:fixed; inset:0;
  background:rgba(0,0,0,.52);
  z-index:900;
  display:none;
  align-items:flex-end;
  padding:14px 12px calc(14px + env(safe-area-inset-bottom));
}
.sheet{
  width:100%;
  background:linear-gradient(180deg, rgba(19,44,23,.98), rgba(15,38,19,.98));
  border:1px solid var(--border2);
  border-radius:18px;
  box-shadow:var(--shadow);
  overflow:hidden;
}
.sheet-h{
  padding:12px 12px 10px;
  display:flex;align-items:flex-start;justify-content:space-between;gap:10px;
  border-bottom:1px solid var(--border);
}
.sheet-h .title{font-size:13px;font-weight:900;letter-spacing:-.2px;}
.sheet-h .sub{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.35;}
.sheet-h .x{
  width:38px;height:38px;border-radius:12px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--border);
  color:var(--muted);
  cursor:pointer;
}
.sheet-h .x:active{transform:scale(.97);}
.sheet-b{padding:12px;}

.badge{
  display:inline-flex;align-items:center;gap:6px;
  background:#0c2a14;border:1px solid var(--border2);
  padding:6px 10px;border-radius:999px;
  font-size:11px;color:var(--muted);
}
.badge code{color:var(--green);font-weight:900;background:transparent;}

.grid{display:grid;gap:10px;}
.label{font-size:11px;color:var(--muted);margin-bottom:6px;}
.field input, .field textarea{
  width:100%;
  border-radius:12px;
  border:1px solid var(--border2);
  background:rgba(10,31,14,.25);
  color:var(--text);
  padding:10px 11px;
  font-size:13px;
  outline:none;
}
.field textarea{min-height:90px;resize:none;line-height:1.35;}
.field input:focus, .field textarea:focus{border-color:var(--green); box-shadow:0 0 0 3px rgba(34,197,94,.12);}
.hint{font-size:11px;color:var(--muted2);line-height:1.35;}

.stepper{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:10px 12px;border-top:1px solid var(--border);
  background:rgba(0,0,0,.08);
}
.stepper .left{
  font-size:11px;color:var(--muted);
}
.stepper .btns{display:flex;gap:8px;}
.btn{
  height:42px;
  border-radius:12px;
  border:1px solid var(--border2);
  background:var(--card2);
  color:var(--text);
  font-weight:900;font-size:13px;
  cursor:pointer;
  padding:0 12px;
}
.btn:active{transform:scale(.98);}
.btn.green{background:var(--green);border:none;color:#061a0a;}
.btn:disabled{opacity:.35;cursor:not-allowed;}
.btn.ghost{background:transparent;border:1px solid var(--border2);}

.toast{
  position:fixed;top:calc(var(--top-h) + 10px);left:50%;
  transform:translateX(-50%) translateY(-6px);
  background:rgba(19,44,23,.95);
  border:1px solid var(--border2);
  border-radius:999px;
  padding:8px 14px;
  font-size:12px;color:var(--text);
  z-index:950;
  opacity:0;pointer-events:none;transition:all .2s;
  white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* markers/popup */
.maplibregl-ctrl-attrib{display:none !important;}
.maplibregl-canvas{touch-action:none;}
.maplibregl-popup{pointer-events:auto;}
.maplibregl-popup-content{
  background:rgba(15,38,19,.96) !important;
  border:1px solid #2a5c34 !important;
  border-radius:12px !important;
  padding:9px 10px !important;
  box-shadow:0 10px 26px rgba(0,0,0,.55) !important;
  font-family:var(--font) !important;
  max-width:240px !important;
}
.maplibregl-popup-tip{border-top-color:#2a5c34 !important;}
.maplibregl-popup-close-button{
  color:var(--muted) !important;font-size:18px !important;
  top:2px !important;right:6px !important;
}
.pop-title{font-size:13px;font-weight:900;color:#fff;line-height:1.2;}
.pop-sub{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.35;}
.pop-price{margin-top:6px;font-size:12px;}
.pop-price s{color:#90b79a;opacity:.9;margin-right:6px;}
.pop-time{font-size:10px;color:#4a7a52;margin-top:6px;}
.pop-tag{
  display:inline-flex;align-items:center;gap:6px;
  background:#0d3318;color:var(--green);
  font-size:10px;font-weight:900;border-radius:7px;
  padding:3px 8px;margin-bottom:6px;letter-spacing:.35px;
  border:1px solid rgba(42,92,52,.65);
}
.rmarker{
  width:34px;height:34px;border-radius:50%;
  background:rgba(15,38,19,.95);
  border:2.5px solid var(--green);
  box-shadow:0 2px 12px rgba(0,0,0,.5);
  cursor:pointer;position:relative;display:grid;place-items:center;
  font-size:16px;
}
.rmarker.me{border-color:#fff;}
.rmarker .ping{
  position:absolute;inset:-6px;border-radius:50%;
  border:2px solid var(--green);opacity:0;
  animation:ping 2.8s ease-out infinite;
}
@keyframes ping{0%{transform:scale(.82);opacity:.65;}100%{transform:scale(2);opacity:0;}}

@media (max-width:360px){
  .userpill b{max-width:120px;}
}
</style>
</head>

<body>
<header class="topbar">
  <div class="brand">
    <div class="icon">🍛</div>
    <div class="name">Roti<span>Pani</span></div>
  </div>
  <div class="userpill">👤 <b id="userLabel">Not logged in</b></div>
</header>

<div id="map"></div>

<div class="bottom">
  <button class="primary" id="openWizardBtn" disabled>Post Deal</button>
</div>

<div class="toast" id="toast"></div>

<!-- LOGIN -->
<div class="overlay" id="loginOverlay" role="dialog" aria-modal="true">
  <div class="sheet">
    <div class="sheet-h">
      <div>
        <div class="title">Restaurant Login</div>
        <div class="sub">Enter your username. We automatically use <b>@rotipani.net</b>.</div>
      </div>
      <button class="x" id="closeLoginBtn" aria-label="Close">✕</button>
    </div>
    <div class="sheet-b">
      <div class="grid">
        <div class="badge">Account: <code id="emailPreview">—</code></div>

        <div class="field">
          <div class="label">Username</div>
          <input id="usernameInput" placeholder="e.g. alrahman" autocomplete="off" inputmode="text" />
          <div class="hint">Only letters/numbers/underscore/dot. No spaces.</div>
        </div>

        <div style="display:flex;gap:10px;">
          <button class="btn ghost" id="logoutBtn" style="display:none;flex:1;">Logout</button>
          <button class="btn green" id="loginBtn" style="flex:1;">Continue</button>
        </div>

        <div class="hint">For real production security, add Firebase Auth (this is passwordless demo login).</div>
      </div>
    </div>
  </div>
</div>

<!-- WIZARD -->
<div class="overlay" id="wizardOverlay" role="dialog" aria-modal="true">
  <div class="sheet">
    <div class="sheet-h">
      <div>
        <div class="title" id="stepTitle">Post a Deal</div>
        <div class="sub" id="stepSub">Step 1 of 4</div>
      </div>
      <button class="x" id="closeWizardBtn" aria-label="Close">✕</button>
    </div>

    <div class="sheet-b" id="stepBody"></div>

    <div class="stepper">
      <div class="left" id="stepLeft">Step 1/4</div>
      <div class="btns">
        <button class="btn ghost" id="backBtn">Back</button>
        <button class="btn green" id="nextBtn">Next</button>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, onValue, set, update, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

/* Firebase */
const app = initializeApp({
  apiKey:"AIzaSyD_c9jMxAA6dtyk_EXAHnH09OEAoalUADA",
  authDomain:"trackingclients.firebaseapp.com",
  databaseURL:"https://trackingclients-default-rtdb.firebaseio.com/",
  projectId:"trackingclients",
  storageBucket:"trackingclients.appspot.com",
  messagingSenderId:"27490943622",
  appId:"1:27490943622:web:d6c87547aa5df440508707"
}, "rotiPaniPostWizard");

const db = getDatabase(app);
const USERS = "rotipani/restaurantsV2"; // recommended new schema

/* State */
let map;
let myLat=null, myLng=null;
let watchId=null;

let myUsername = localStorage.getItem("rp_username") || "";
let myId = localStorage.getItem("rp_uid") || "";

/* Data for map markers (optional, but keeps “me” visible) */
const markers = new Map();
const restData = new Map();

/* DOM */
const toastEl = document.getElementById("toast");
const openWizardBtn = document.getElementById("openWizardBtn");
const userLabel = document.getElementById("userLabel");

const loginOverlay = document.getElementById("loginOverlay");
const closeLoginBtn = document.getElementById("closeLoginBtn");
const usernameInput = document.getElementById("usernameInput");
const emailPreview = document.getElementById("emailPreview");
const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");

const wizardOverlay = document.getElementById("wizardOverlay");
const closeWizardBtn = document.getElementById("closeWizardBtn");
const stepTitle = document.getElementById("stepTitle");
const stepSub = document.getElementById("stepSub");
const stepLeft = document.getElementById("stepLeft");
const stepBody = document.getElementById("stepBody");
const backBtn = document.getElementById("backBtn");
const nextBtn = document.getElementById("nextBtn");

/* Toast */
let toastT;
function toast(t, ms=2400){
  toastEl.textContent = t;
  toastEl.classList.add("show");
  clearTimeout(toastT);
  toastT = setTimeout(()=>toastEl.classList.remove("show"), ms);
}

/* Helpers */
function openSheet(el){ el.style.display="flex"; }
function closeSheet(el){ el.style.display="none"; }

function cleanUsername(u){
  u = String(u || "").trim().toLowerCase();
  u = u.replace(/[^a-z0-9._]/g, "");
  u = u.replace(/^\.+/,"");
  return u.slice(0, 24);
}
function emailFromUsername(u){ return u ? `${u}@rotipani.net` : ""; }
function uidFromUsername(u){ return u ? `rp_${u}` : ""; }
function digitsOnly(s){ return String(s||"").replace(/\D/g,""); }
function normalizeWa(local){
  let d = digitsOnly(local);
  if(d.startsWith("0")) d = d.slice(1);
  d = d.slice(0, 11);
  return d ? `92${d}` : "";
}
function esc(s){
  return String(s ?? "")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function fmtTs(ms){
  if(!ms) return "";
  const d = new Date(ms);
  if(Number.isNaN(d.getTime())) return "";
  const p=n=>String(n).padStart(2,"0");
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

/* Map popup */
function mkPopup(d){
  const rn = (d.restName||"").trim();
  const title = (d.dealTitle||"").trim();
  const desc = (d.dealDesc||"").trim();
  const op = (d.origPrice||"").toString().trim();
  const dp = (d.discPrice||"").toString().trim();
  const wa = (d.whatsapp||"").trim();
  const time = d.tsClient ? fmtTs(d.tsClient) : "";

  if(!title && !desc && !op && !dp) return `<div class="pop-sub"><i>No deal posted yet</i></div>`;
  return `
    <div class="pop-tag">🏷️ DEAL</div>
    <div class="pop-title">${esc(title || rn || "Deal")}</div>
    ${rn && title ? `<div class="pop-sub">${esc(rn)}</div>` : ""}
    ${desc ? `<div class="pop-sub" style="margin-top:6px">${esc(desc)}</div>` : ""}
    ${(op||dp) ? `<div class="pop-price">${op?`<s>PKR ${esc(op)}</s>`:""}${dp?`<b>PKR ${esc(dp)}</b>`:""}</div>` : ""}
    ${wa ? `<div class="pop-sub" style="margin-top:6px">WhatsApp: <b>${esc(wa)}</b></div>` : ""}
    ${time ? `<div class="pop-time">${esc(time)}</div>` : ""}
  `;
}
function mkEl(isMe){
  const d=document.createElement("div");
  d.className="rmarker"+(isMe?" me":"");
  d.innerHTML = `<div class="ping"></div>${isMe ? "📍" : "🍽️"}`;
  return d;
}
function upsert(uid, data){
  const isMe = uid === myId;
  const lngLat = [data.lng, data.lat];

  if(markers.has(uid)){
    const {marker, popup} = markers.get(uid);
    marker.setLngLat(lngLat);
    popup.setLngLat(lngLat);
    popup.setHTML(mkPopup(data));
    if(!popup.isOpen()) popup.addTo(map);
    return;
  }
  const el = mkEl(isMe);
  const popup = new maplibregl.Popup({
    offset:[0,-20],
    closeButton:isMe,
    closeOnClick:false,
    maxWidth:"240px"
  }).setHTML(mkPopup(data)).setLngLat(lngLat).addTo(map);

  const marker = new maplibregl.Marker({element:el, anchor:"center"})
    .setLngLat(lngLat).addTo(map);

  el.addEventListener("click", ()=>{
    const latest = restData.get(uid) || data;
    popup.setHTML(mkPopup(latest));
    if(!popup.isOpen()) popup.setLngLat(lngLat).addTo(map);
  });

  markers.set(uid, {marker, popup});
}
function drop(uid){
  const m = markers.get(uid);
  if(!m) return;
  m.popup.remove(); m.marker.remove();
  markers.delete(uid); restData.delete(uid);
}

/* Sync (optional) */
function listenRestaurants(){
  onValue(ref(db, USERS), snap=>{
    const live = new Set();
    if(snap.exists()){
      snap.forEach(child=>{
        const uid = child.key;
        const d = child.val();
        if(!d || typeof d.lat !== "number" || typeof d.lng !== "number") return;
        live.add(uid);
        const merged = {...d, id: uid};
        restData.set(uid, merged);
        upsert(uid, merged);
      });
    }
    for(const uid of markers.keys()){
      if(!live.has(uid)) drop(uid);
    }
  });
}

/* Location */
async function initMap(){
  map = new maplibregl.Map({
    container:"map",
    style:{
      version:8,
      sources:{osm:{type:"raster",
        tiles:[
          "https://a.tile.openstreetmap.org/{z}/{x}/{y}.png",
          "https://b.tile.openstreetmap.org/{z}/{x}/{y}.png"
        ],
        tileSize:256
      }},
      layers:[{id:"osm", type:"raster", source:"osm",
        paint:{
          "raster-saturation": .28,
          "raster-hue-rotate": 105,
          "raster-brightness-max": .55,
          "raster-brightness-min": .06
        }
      }]
    },
    center:[4.35,50.85],
    zoom:13,
    maxZoom:19,
    attributionControl:false,
    fadeDuration:0
  });
  await new Promise(res=>map.on("load",res));
}
async function updateMyLocationOnly(){
  if(!myId || myLat==null || myLng==null) return;
  await update(ref(db, `${USERS}/${myId}`), { lat:myLat, lng:myLng, lastSeen: serverTimestamp() });
}
function startWatch(){
  if(!navigator.geolocation){ toast("Geolocation not supported"); return; }
  if(watchId!=null) return;
  watchId = navigator.geolocation.watchPosition(
    async pos=>{
      myLat=pos.coords.latitude; myLng=pos.coords.longitude;
      openWizardBtn.disabled = !(myId && myLat!=null);
      try{ await updateMyLocationOnly(); }catch{}
    },
    err=>toast("Location: "+err.message),
    {enableHighAccuracy:true, timeout:10000, maximumAge:4000}
  );
}

/* Login UI */
function refreshUserUI(){
  userLabel.textContent = myUsername ? emailFromUsername(myUsername) : "Not logged in";
  emailPreview.textContent = myUsername ? emailFromUsername(myUsername) : "—";
  logoutBtn.style.display = myId ? "block" : "none";
  openWizardBtn.disabled = !(myId && myLat!=null);
}
function ensureLogin(){
  if(!myId){
    usernameInput.value = cleanUsername(myUsername);
    openSheet(loginOverlay);
    setTimeout(()=>usernameInput.focus(), 60);
    return false;
  }
  return true;
}

usernameInput.addEventListener("input", ()=>{
  usernameInput.value = cleanUsername(usernameInput.value);
  emailPreview.textContent = emailFromUsername(usernameInput.value);
});
loginBtn.addEventListener("click", async ()=>{
  const u = cleanUsername(usernameInput.value);
  if(!u){ toast("Enter a username"); return; }
  myUsername = u;
  myId = uidFromUsername(u);
  localStorage.setItem("rp_username", myUsername);
  localStorage.setItem("rp_uid", myId);
  closeSheet(loginOverlay);
  toast("Logged in as " + emailFromUsername(myUsername));
  refreshUserUI();

  try{
    await update(ref(db, `${USERS}/${myId}`), {
      username: myUsername,
      email: emailFromUsername(myUsername),
      lastSeen: serverTimestamp()
    });
    await updateMyLocationOnly();
  }catch{
    toast("DB error");
  }
});
logoutBtn.addEventListener("click", ()=>{
  localStorage.removeItem("rp_username");
  localStorage.removeItem("rp_uid");
  myUsername=""; myId="";
  refreshUserUI();
  toast("Logged out");
});

closeLoginBtn.addEventListener("click", ()=>closeSheet(loginOverlay));
loginOverlay.addEventListener("click", (e)=>{ if(e.target===loginOverlay) closeSheet(loginOverlay); });

/* -------- Wizard (step-by-step) -------- */
const wizard = {
  step: 0,
  data: {
    restName: "",
    dealTitle: "",
    dealDesc: "",
    origPrice: "",
    discPrice: "",
    waLocal: ""
  }
};
const steps = [
  {
    title: "Restaurant info",
    sub: "Step 1 of 4",
    render(){
      return `
        <div class="grid">
          <div class="badge">Logged in as <code>${esc(emailFromUsername(myUsername))}</code></div>
          <div class="field">
            <div class="label">Restaurant name</div>
            <input id="s_restName" placeholder="e.g. Al Rehman Restaurant" value="${esc(wizard.data.restName)}" autocomplete="off"/>
            <div class="hint">This name will appear on the deal popup.</div>
          </div>
        </div>
      `;
    },
    read(){
      wizard.data.restName = document.getElementById("s_restName").value.trim();
    },
    validate(){
      return wizard.data.restName ? "" : "Restaurant name is required";
    }
  },
  {
    title: "Deal title",
    sub: "Step 2 of 4",
    render(){
      return `
        <div class="grid">
          <div class="field">
            <div class="label">Deal title</div>
            <input id="s_title" placeholder="e.g. Biryani Friday Special" value="${esc(wizard.data.dealTitle)}" maxlength="60" autocomplete="off"/>
            <div class="hint">Keep it short and clear.</div>
          </div>
        </div>
      `;
    },
    read(){
      wizard.data.dealTitle = document.getElementById("s_title").value.trim();
    },
    validate(){
      return wizard.data.dealTitle ? "" : "Deal title is required";
    }
  },
  {
    title: "Description & prices",
    sub: "Step 3 of 4",
    render(){
      return `
        <div class="grid">
          <div class="field">
            <div class="label">Deal description</div>
            <textarea id="s_desc" placeholder="e.g. Chicken biryani + raita, limited time offer…" maxlength="180">${esc(wizard.data.dealDesc)}</textarea>
          </div>
          <div class="field">
            <div class="label">Original price (PKR)</div>
            <input id="s_op" inputmode="numeric" placeholder="e.g. 800" value="${esc(wizard.data.origPrice)}"/>
          </div>
          <div class="field">
            <div class="label">Discount price (PKR)</div>
            <input id="s_dp" inputmode="numeric" placeholder="e.g. 550" value="${esc(wizard.data.discPrice)}"/>
          </div>
        </div>
      `;
    },
    read(){
      wizard.data.dealDesc = document.getElementById("s_desc").value.trim();
      wizard.data.origPrice = digitsOnly(document.getElementById("s_op").value.trim());
      wizard.data.discPrice = digitsOnly(document.getElementById("s_dp").value.trim());
    },
    validate(){
      if(!wizard.data.dealDesc) return "Deal description is required";
      if(!wizard.data.origPrice) return "Original price is required";
      if(!wizard.data.discPrice) return "Discount price is required";
      if(Number(wizard.data.discPrice) >= Number(wizard.data.origPrice)) return "Discount must be less than original price";
      return "";
    }
  },
  {
    title: "WhatsApp & confirm",
    sub: "Step 4 of 4",
    render(){
      const waFull = normalizeWa(wizard.data.waLocal);
      return `
        <div class="grid">
          <div class="field">
            <div class="label">WhatsApp number</div>
            <input id="s_wa" inputmode="numeric" placeholder="03452233450" value="${esc(wizard.data.waLocal)}"/>
            <div class="hint">We automatically add country code <b>92</b>. Saved as: <b>${esc(waFull || "92…")}</b></div>
          </div>

          <div class="badge">Review</div>
          <div class="hint">
            <b>${esc(wizard.data.restName)}</b><br/>
            ${esc(wizard.data.dealTitle)}<br/>
            PKR ${esc(wizard.data.origPrice)} → PKR ${esc(wizard.data.discPrice)}
          </div>
        </div>
      `;
    },
    afterRender(){
      const el = document.getElementById("s_wa");
      el.addEventListener("input", ()=>{
        el.value = digitsOnly(el.value).slice(0, 11);
      });
    },
    read(){
      wizard.data.waLocal = document.getElementById("s_wa").value.trim();
    },
    validate(){
      const wa = normalizeWa(wizard.data.waLocal);
      if(!wa) return "WhatsApp number is required";
      if(wa.length < 11) return "WhatsApp number looks too short";
      return "";
    }
  }
];

function renderStep(){
  const s = steps[wizard.step];
  stepTitle.textContent = s.title;
  stepSub.textContent = s.sub;
  stepLeft.textContent = `Step ${wizard.step+1}/${steps.length}`;

  stepBody.innerHTML = s.render();

  backBtn.disabled = wizard.step === 0;
  nextBtn.textContent = (wizard.step === steps.length-1) ? "Post" : "Next";

  // optional afterRender hook
  if(typeof s.afterRender === "function") s.afterRender();
}

function openWizard(){
  if(!ensureLogin()) return;
  openSheet(wizardOverlay);
  wizard.step = 0;
  renderStep();
}

function closeWizard(){
  closeSheet(wizardOverlay);
}

backBtn.addEventListener("click", ()=>{
  steps[wizard.step].read();
  if(wizard.step > 0){
    wizard.step--;
    renderStep();
  }
});

nextBtn.addEventListener("click", async ()=>{
  const s = steps[wizard.step];
  s.read();
  const err = s.validate();
  if(err){ toast(err); return; }

  if(wizard.step < steps.length-1){
    wizard.step++;
    renderStep();
    return;
  }

  // Final Post
  if(myLat==null || myLng==null){ toast("Location not ready"); return; }

  const payload = {
    username: myUsername,
    email: emailFromUsername(myUsername),

    restName: wizard.data.restName,
    dealTitle: wizard.data.dealTitle,
    dealDesc: wizard.data.dealDesc,
    origPrice: wizard.data.origPrice,
    discPrice: wizard.data.discPrice,
    whatsapp: normalizeWa(wizard.data.waLocal),

    lat: myLat,
    lng: myLng,

    ts: serverTimestamp(),
    tsClient: Date.now(),
    lastSeen: serverTimestamp()
  };

  nextBtn.disabled = true;
  try{
    // optimistic map update
    restData.set(myId, { ...payload, id: myId });
    upsert(myId, { ...payload, id: myId });

    await set(ref(db, `${USERS}/${myId}`), payload);
    toast("Deal posted");
    closeWizard();
  }catch(e){
    toast("Failed to post");
  }finally{
    nextBtn.disabled = false;
  }
});

openWizardBtn.addEventListener("click", openWizard);
closeWizardBtn.addEventListener("click", closeWizard);
wizardOverlay.addEventListener("click", (e)=>{ if(e.target===wizardOverlay) closeWizard(); });

/* Boot */
(async function boot(){
  await initMap();
  listenRestaurants();
  startWatch();

  // restore login if present
  myUsername = cleanUsername(myUsername);
  if(myUsername) myId = uidFromUsername(myUsername);

  refreshUserUI();

  // if not logged in, show login sheet immediately
  if(!myId) openSheet(loginOverlay);
})();
</script>
</body>
</html>
