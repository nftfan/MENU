<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BETBIT // PREDICT_</title>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#04070a;
    --panel:#0a1410;
    --panel2:#0d1a14;
    --line:#163326;
    --neon:#39ff14;          /* core neon green */
    --neon-dim:#1f8a12;
    --neon-soft:#0e2a16;
    --cyan:#00ffe0;
    --magenta:#ff2bd6;
    --amber:#ffd23f;
    --muted:#4f6b58;
    --text:#c8ffd6;
    --red:#ff3b5c;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{
    font-family:'Share Tech Mono',monospace;
    background:
      radial-gradient(900px 500px at 50% -10%, rgba(57,255,20,.10), transparent 60%),
      radial-gradient(700px 600px at 110% 120%, rgba(0,255,224,.06), transparent 55%),
      var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;justify-content:center;align-items:flex-start;
    padding:14px;font-size:12px;
    -webkit-font-smoothing:antialiased;
  }
  /* CRT scanline + grain overlay */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:99;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(0,0,0,.18) 3px, rgba(0,0,0,0) 4px);
    mix-blend-mode:multiply;opacity:.5;
  }
  body::after{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:98;
    background:radial-gradient(circle at 50% 40%, transparent 60%, rgba(0,0,0,.55) 100%);
  }

  .container{width:100%;max-width:390px;position:relative;z-index:1;}

  /* header */
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:12px;letter-spacing:2px;color:var(--neon);
        text-shadow:0 0 6px rgba(57,255,20,.8),0 0 18px rgba(57,255,20,.4);}
  .logo .blink{animation:blink 1.05s steps(1) infinite;}
  @keyframes blink{50%{opacity:0;}}
  .net-pill{font-family:'Share Tech Mono';font-size:9px;color:var(--cyan);letter-spacing:1px;
            border:1px solid rgba(0,255,224,.4);border-radius:3px;padding:3px 7px;
            text-shadow:0 0 6px rgba(0,255,224,.6);}

  /* tabs */
  .tabs{display:flex;gap:6px;margin-bottom:11px;}
  .tab{flex:1;text-align:center;padding:7px 4px;font-size:10px;letter-spacing:1px;cursor:pointer;
       background:var(--panel);color:var(--muted);border:1px solid var(--line);border-radius:4px;
       text-transform:uppercase;transition:.15s;}
  .tab:hover{color:var(--text);border-color:var(--neon-dim);}
  .tab.active{color:var(--neon);border-color:var(--neon);box-shadow:0 0 10px rgba(57,255,20,.25),inset 0 0 12px rgba(57,255,20,.08);
              text-shadow:0 0 6px rgba(57,255,20,.7);}

  /* wallet bar */
  .wallet-bar{display:flex;align-items:center;justify-content:space-between;gap:8px;
              background:var(--panel);border:1px solid var(--line);border-radius:5px;padding:8px 10px;margin-bottom:11px;}
  .wallet-info{font-size:10px;line-height:1.5;}
  .wallet-info .addr{color:var(--neon);text-shadow:0 0 5px rgba(57,255,20,.5);}
  .wallet-info .bal{color:var(--muted);display:flex;align-items:center;gap:4px;}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--red);box-shadow:0 0 6px var(--red);}
  .dot.ok{background:var(--neon);box-shadow:0 0 7px var(--neon);}
  .btn-wallet{font-family:'Share Tech Mono';background:transparent;color:var(--cyan);border:1px solid var(--cyan);
              border-radius:4px;padding:8px 11px;font-size:10px;letter-spacing:1px;cursor:pointer;white-space:nowrap;
              text-shadow:0 0 6px rgba(0,255,224,.5);box-shadow:0 0 8px rgba(0,255,224,.15);transition:.15s;}
  .btn-wallet:hover{background:rgba(0,255,224,.08);}
  .btn-wallet.connected{color:var(--muted);border-color:var(--line);text-shadow:none;box-shadow:none;}

  /* ===== THE GRAPH BOX (now the terminal screen) ===== */
  .screen{position:relative;background:
            repeating-linear-gradient(0deg, rgba(57,255,20,.025) 0 1px, transparent 1px 22px),
            linear-gradient(180deg,#06120c,#040a07);
          border:1px solid var(--neon-dim);border-radius:8px;padding:16px 15px;min-height:148px;margin-bottom:12px;
          box-shadow:0 0 18px rgba(57,255,20,.12),inset 0 0 30px rgba(57,255,20,.05);overflow:hidden;}
  .screen .corner{position:absolute;width:11px;height:11px;border:1px solid var(--neon);opacity:.7;}
  .screen .c-tl{top:6px;left:6px;border-right:none;border-bottom:none;}
  .screen .c-tr{top:6px;right:6px;border-left:none;border-bottom:none;}
  .screen .c-bl{bottom:6px;left:6px;border-right:none;border-top:none;}
  .screen .c-br{bottom:6px;right:6px;border-left:none;border-top:none;}
  .screen-head{display:flex;justify-content:space-between;font-size:9px;color:var(--neon-dim);
               letter-spacing:1px;margin-bottom:12px;text-transform:uppercase;}
  .screen-head .live::before{content:"";display:inline-block;width:6px;height:6px;border-radius:50%;
               background:var(--neon);box-shadow:0 0 7px var(--neon);margin-right:5px;animation:blink 1.4s steps(1) infinite;vertical-align:0;}

  /* typed question lines */
  .qline{font-size:13px;line-height:1.55;color:var(--neon);margin:0 0 11px;min-height:1.55em;
         text-shadow:0 0 7px rgba(57,255,20,.55);white-space:pre-wrap;}
  .qline .qn{color:var(--cyan);text-shadow:0 0 6px rgba(0,255,224,.5);}
  .caret{display:inline-block;width:8px;background:var(--neon);box-shadow:0 0 8px var(--neon);
         margin-left:1px;animation:caret .8s steps(1) infinite;}
  @keyframes caret{50%{opacity:0;}}

  /* answer rows */
  .answers{margin-bottom:10px;}
  .arow{display:flex;align-items:center;gap:9px;padding:8px 9px;margin-bottom:8px;
        background:var(--panel);border:1px solid var(--line);border-radius:5px;opacity:0;transform:translateX(-8px);
        transition:opacity .35s,transform .35s,border-color .2s;}
  .arow.reveal{opacity:1;transform:translateX(0);}
  .arow .alabel{flex:1;font-size:10px;color:var(--muted);letter-spacing:.5px;}
  .arow .alabel b{color:var(--neon);}
  .toggle{display:flex;gap:6px;}
  .opt{font-family:'Share Tech Mono';width:46px;text-align:center;padding:7px 0;font-size:10px;letter-spacing:1px;
       cursor:pointer;border-radius:4px;border:1px solid var(--line);background:#08120d;color:var(--muted);transition:.13s;user-select:none;}
  .opt:hover{color:var(--text);}
  .opt.yes.sel{color:#04070a;background:var(--neon);border-color:var(--neon);box-shadow:0 0 12px rgba(57,255,20,.55);font-weight:700;text-shadow:none;}
  .opt.no.sel{color:#04070a;background:var(--magenta);border-color:var(--magenta);box-shadow:0 0 12px rgba(255,43,214,.5);font-weight:700;}

  /* submit */
  .btn-submit{font-family:'Orbitron',sans-serif;font-weight:800;width:100%;letter-spacing:2px;
              background:transparent;color:var(--neon);border:1px solid var(--neon);border-radius:6px;
              padding:12px 0;font-size:12px;cursor:pointer;text-transform:uppercase;
              text-shadow:0 0 8px rgba(57,255,20,.7);box-shadow:0 0 14px rgba(57,255,20,.2),inset 0 0 16px rgba(57,255,20,.06);
              transition:.15s;}
  .btn-submit:hover:not(:disabled){background:rgba(57,255,20,.1);box-shadow:0 0 22px rgba(57,255,20,.45);}
  .btn-submit:disabled{color:var(--muted);border-color:var(--line);text-shadow:none;box-shadow:none;cursor:not-allowed;}
  .hint{font-size:9.5px;color:var(--muted);text-align:center;margin:8px 0 0;letter-spacing:.5px;line-height:1.5;}
  .countdown{font-size:10px;color:var(--amber);text-align:center;margin:9px 0 0;letter-spacing:1px;text-shadow:0 0 6px rgba(255,210,63,.4);}

  /* history */
  .h-title{font-size:9px;color:var(--neon-dim);letter-spacing:1.5px;text-transform:uppercase;margin:2px 0 9px;}
  .h-card{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:11px;margin-bottom:9px;}
  .h-card .h-when{font-size:9px;color:var(--muted);letter-spacing:.5px;margin-bottom:8px;display:flex;justify-content:space-between;}
  .h-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;padding:5px 0;border-top:1px dashed var(--line);font-size:10.5px;}
  .h-row:first-of-type{border-top:none;}
  .h-q{flex:1;color:var(--text);line-height:1.45;}
  .h-a{font-size:9.5px;font-weight:700;letter-spacing:1px;padding:2px 8px;border-radius:3px;white-space:nowrap;}
  .h-a.yes{color:var(--neon);border:1px solid var(--neon-dim);background:var(--neon-soft);text-shadow:0 0 5px rgba(57,255,20,.5);}
  .h-a.no{color:var(--magenta);border:1px solid rgba(255,43,214,.4);background:rgba(255,43,214,.08);}
  .empty{color:var(--muted);text-align:center;padding:22px 0;font-size:10px;letter-spacing:.5px;}

  #toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);font-family:'Share Tech Mono';
         background:#06120c;border:1px solid var(--neon-dim);color:var(--neon);font-size:11px;
         padding:10px 16px;border-radius:5px;z-index:120;display:none;max-width:92%;text-align:center;
         box-shadow:0 0 16px rgba(57,255,20,.25);text-shadow:0 0 6px rgba(57,255,20,.5);letter-spacing:.5px;}
  #toast.err{border-color:var(--red);color:#ffd2d8;box-shadow:0 0 16px rgba(255,59,92,.3);text-shadow:none;}
</style>
</head>
<body>
<div class="container">

  <div class="topbar">
    <div class="logo">BET<span style="color:var(--cyan);">BIT</span> // PREDICT<span class="blink">_</span></div>
    <span class="net-pill">⬡ POLYGON</span>
  </div>

  <div class="tabs">
    <div class="tab active" id="tabPlay" onclick="showTab('play')">▶ Predict</div>
    <div class="tab" id="tabHistory" onclick="showTab('history')">▤ History</div>
  </div>

  <div class="wallet-bar">
    <div class="wallet-info">
      <div class="addr" id="walletAddr">NOT_CONNECTED</div>
      <div class="bal"><span class="dot" id="netDot"></span><span id="walletBal">—</span></div>
    </div>
    <button class="btn-wallet" id="connectBtn" onclick="connectWallet()">CONNECT</button>
  </div>

  <!-- ===== PLAY VIEW ===== -->
  <div id="view-play">
    <!-- the "graph box" => terminal screen with typed questions -->
    <div class="screen">
      <span class="corner c-tl"></span><span class="corner c-tr"></span>
      <span class="corner c-bl"></span><span class="corner c-br"></span>
      <div class="screen-head"><span class="live">FEED ONLINE</span><span>24:00:00 WINDOW</span></div>
      <div id="qzone"></div>
    </div>

    <!-- answer rows -->
    <div class="answers" id="answers"></div>

    <button class="btn-submit" id="submitBtn" onclick="submitAnswers()" disabled>// LOCK IN PREDICTIONS</button>
    <div class="countdown" id="countdown"></div>
    <div class="hint" id="hint">Connect wallet · answer all 3 · resolves in 24h.</div>
  </div>

  <!-- ===== HISTORY VIEW ===== -->
  <div id="view-history" style="display:none;">
    <div class="h-title">// SUBMITTED PREDICTIONS</div>
    <div id="historyBody"><div class="empty">NO SUBMISSIONS YET_</div></div>
  </div>

</div>

<div id="toast"></div>

<!-- ===================== APP (module) ===================== -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6w6auszWRniQfZCjb4nXE_bq9Mzt9dOs",
  authDomain: "betbtc-6d881.firebaseapp.com",
  databaseURL: "https://betbtc-6d881-default-rtdb.firebaseio.com",
  projectId: "betbtc-6d881",
  storageBucket: "betbtc-6d881.firebasestorage.app",
  messagingSenderId: "962176232122",
  appId: "1:962176232122:web:a277d922543c3378033083",
  measurementId: "G-V4XNB7K1E0"
};
const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);

const POLYGON = {
  chainIdHex:"0x89", chainName:"Polygon Mainnet",
  nativeCurrency:{name:"POL",symbol:"POL",decimals:18},
  rpcUrls:["https://polygon-rpc.com"], blockExplorerUrls:["https://polygonscan.com"]
};

window.__w3 = { db, ref, push, onValue, serverTimestamp, ethers:window.ethers, POLYGON };
window.dispatchEvent(new Event("w3ready"));
</script>

<!-- ===================== UI LOGIC ===================== -->
<script>
let W3=null;
window.addEventListener("w3ready", ()=>{ W3=window.__w3; boot(); });

/* ---- daily questions ----
   These are written so the answer is ~50/50 and resolvable from a public source.
   Swap the text freely; the engine doesn't care how many words. */
function todayQuestions(){
  return [
    { id:"q1", text:"Will tomorrow's high temperature be WARMER than today's in your city?" },
    { id:"q2", text:"Will this video's view counter be HIGHER 24h from now than right now?" },
    { id:"q3", text:"Will tomorrow's public random draw land on an EVEN number?" }
  ];
}

let provider=null, signer=null, account=null, onPolygon=false;
let questions=[], answers={}, typingDone=false;

function toast(msg,kind){ const t=document.getElementById("toast"); t.textContent=msg; t.className=kind||""; t.style.display="block"; clearTimeout(t._h); t._h=setTimeout(()=>t.style.display="none",4200); }
function shortAddr(a){ return a?a.slice(0,6)+"…"+a.slice(-4):""; }
function trimErr(m){ m=String(m||""); return m.length>90?m.slice(0,90)+"…":m; }

/* ---- tabs ---- */
function showTab(which){
  document.getElementById("view-play").style.display=which==="play"?"block":"none";
  document.getElementById("view-history").style.display=which==="history"?"block":"none";
  document.getElementById("tabPlay").className="tab"+(which==="play"?" active":"");
  document.getElementById("tabHistory").className="tab"+(which==="history"?" active":"");
}
window.showTab=showTab;

/* ---- boot ---- */
function boot(){
  questions=todayQuestions();
  buildAnswerRows();
  typeQuestions();
  startCountdown();
  if(window.ethereum){
    window.ethereum.on?.("accountsChanged",()=>location.reload());
    window.ethereum.on?.("chainChanged",()=>location.reload());
  }
}

/* ---- typewriter effect for the 3 questions ---- */
function typeQuestions(){
  const zone=document.getElementById("qzone");
  zone.innerHTML="";
  const lines=questions.map((q,i)=>{
    const el=document.createElement("div");
    el.className="qline";
    el.innerHTML=`<span class="qn">[Q${i+1}]</span> <span class="txt"></span>`;
    zone.appendChild(el);
    return el.querySelector(".txt");
  });
  let qi=0;
  function typeLine(){
    if(qi>=questions.length){ typingDone=true; revealAnswers(); return; }
    const target=questions[qi].text;
    const span=lines[qi];
    const caret=document.createElement("span"); caret.className="caret"; caret.innerHTML="&nbsp;";
    span.parentElement.appendChild(caret);
    let ci=0;
    const t=setInterval(()=>{
      span.textContent=target.slice(0,++ci);
      if(ci>=target.length){
        clearInterval(t);
        caret.remove();
        qi++;
        setTimeout(typeLine, 240);
      }
    }, 26);
  }
  typeLine();
}

/* ---- answer rows (built hidden, revealed after typing) ---- */
function buildAnswerRows(){
  const wrap=document.getElementById("answers");
  wrap.innerHTML="";
  questions.forEach((q,i)=>{
    const row=document.createElement("div");
    row.className="arow"; row.id="arow-"+q.id;
    row.innerHTML=`
      <div class="alabel"><b>Q${i+1}</b> · your call</div>
      <div class="toggle">
        <div class="opt yes" data-q="${q.id}" data-v="YES" onclick="pick('${q.id}','YES')">YES</div>
        <div class="opt no"  data-q="${q.id}" data-v="NO"  onclick="pick('${q.id}','NO')">NO</div>
      </div>`;
    wrap.appendChild(row);
  });
}
function revealAnswers(){
  questions.forEach((q,i)=>{
    setTimeout(()=>document.getElementById("arow-"+q.id).classList.add("reveal"), i*130);
  });
}

function pick(qid,val){
  answers[qid]=val;
  document.querySelectorAll(`.opt[data-q="${qid}"]`).forEach(o=>{
    o.classList.toggle("sel", o.getAttribute("data-v")===val);
  });
  refreshSubmit();
}
window.pick=pick;

function refreshSubmit(){
  const all=questions.every(q=>answers[q.id]);
  const btn=document.getElementById("submitBtn");
  const hint=document.getElementById("hint");
  if(!account){ btn.disabled=true; hint.textContent="Connect wallet · answer all 3 · resolves in 24h."; return; }
  if(!onPolygon){ btn.disabled=true; hint.textContent="Switch to Polygon to submit."; return; }
  btn.disabled=!all;
  hint.textContent= all ? "All set — lock in your 3 predictions." : `Answer all 3 questions (${Object.keys(answers).length}/3).`;
}

/* ---- wallet ---- */
async function connectWallet(){
  if(!window.ethereum){ toast("No wallet found. Install MetaMask.","err"); return; }
  try{
    const eth=window.ethereum;
    await eth.request({method:"eth_requestAccounts"});
    await ensurePolygon(eth);
    provider=new W3.ethers.providers.Web3Provider(eth,"any");
    signer=provider.getSigner();
    account=(await signer.getAddress()).toLowerCase();
    const net=await provider.getNetwork(); onPolygon=(net.chainId===137);
    await refreshWalletUI(); loadHistory(); refreshSubmit();
    toast("WALLET LINKED","");
  }catch(e){ console.error(e); toast(trimErr(e?.message||"Connection failed"),"err"); }
}
window.connectWallet=connectWallet;

async function ensurePolygon(eth){
  try{ await eth.request({method:"wallet_switchEthereumChain",params:[{chainId:W3.POLYGON.chainIdHex}]}); }
  catch(err){
    if(err.code===4902||err?.data?.originalError?.code===4902){ await eth.request({method:"wallet_addEthereumChain",params:[W3.POLYGON]}); }
    else throw err;
  }
}
async function refreshWalletUI(){
  document.getElementById("walletAddr").textContent=shortAddr(account).toUpperCase();
  document.getElementById("netDot").className="dot"+(onPolygon?" ok":"");
  const cb=document.getElementById("connectBtn"); cb.textContent=onPolygon?"● POLYGON":"WRONG NET"; cb.classList.add("connected");
  try{ const b=await provider.getBalance(account); document.getElementById("walletBal").textContent=parseFloat(W3.ethers.utils.formatEther(b)).toFixed(3)+" POL"; }
  catch(e){ document.getElementById("walletBal").textContent="—"; }
}

/* ---- submit -> firebase ---- */
async function submitAnswers(){
  if(!account){ toast("Connect wallet first.","err"); return; }
  if(!onPolygon){ toast("Switch to Polygon.","err"); return; }
  if(!questions.every(q=>answers[q.id])){ toast("Answer all 3 first.","err"); return; }

  const payload={
    wallet:account,
    at:W3.serverTimestamp(),
    localAt:Date.now(),
    items:questions.map(q=>({ q:q.text, a:answers[q.id] }))
  };
  try{
    await W3.push(W3.ref(W3.db,`predictions/${account}`), payload);
    toast("PREDICTIONS LOCKED ✓","");
    // reset selections for a fresh round
    answers={};
    document.querySelectorAll(".opt.sel").forEach(o=>o.classList.remove("sel"));
    refreshSubmit();
    showTab("history");
  }catch(e){ console.error(e); toast("Submit failed — check Firebase rules.","err"); }
}
window.submitAnswers=submitAnswers;

/* ---- history ---- */
function loadHistory(){
  if(!account) return;
  W3.onValue(W3.ref(W3.db,`predictions/${account}`), (snap)=>{
    const v=snap.val()||{};
    renderHistory(v);
  });
}
function renderHistory(map){
  const body=document.getElementById("historyBody");
  const keys=Object.keys(map);
  if(!keys.length){ body.innerHTML='<div class="empty">NO SUBMISSIONS YET_</div>'; return; }
  keys.sort((a,b)=>(map[b]?.localAt||0)-(map[a]?.localAt||0));
  body.innerHTML=keys.map(k=>{
    const s=map[k];
    const when=s.localAt? new Date(s.localAt).toLocaleString() : "—";
    const rows=(s.items||[]).map((it,i)=>`
      <div class="h-row">
        <span class="h-q">[Q${i+1}] ${escapeHtml(it.q)}</span>
        <span class="h-a ${it.a==='YES'?'yes':'no'}">${it.a}</span>
      </div>`).join('');
    return `<div class="h-card"><div class="h-when"><span>◇ ${when}</span><span>24H</span></div>${rows}</div>`;
  }).join('');
}
function escapeHtml(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ---- countdown to next UTC midnight (the 24h resolution) ---- */
function startCountdown(){
  const el=document.getElementById("countdown");
  function tick(){
    const now=new Date();
    const end=new Date(Date.UTC(now.getUTCFullYear(),now.getUTCMonth(),now.getUTCDate()+1,0,0,0));
    let s=Math.max(0,Math.floor((end-now)/1000));
    const h=String(Math.floor(s/3600)).padStart(2,'0'); s%=3600;
    const m=String(Math.floor(s/60)).padStart(2,'0'); const ss=String(s%60).padStart(2,'0');
    el.textContent=`⧗ RESOLVES IN ${h}:${m}:${ss}`;
  }
  tick(); setInterval(tick,1000);
}
</script>
</body>
</html>
