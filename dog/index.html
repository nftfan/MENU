<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEWSWIRE // terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Major+Mono+Display&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#020a02;
    --green:#33ff66;
    --green-dim:#1f9c3f;
    --green-dark:#0c3d18;
    --amber:#ffb454;
    --scan:rgba(51,255,102,0.025);
    --glow:0 0 6px rgba(51,255,102,0.6);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    background:#000;
    color:var(--green);
    font-family:'Share Tech Mono',monospace;
    overflow:hidden;
    text-shadow:var(--glow);
    /* outer room: dark, lets the rounded bezel read as a physical CRT */
    background:
      radial-gradient(ellipse at center, #0a120a 0%, #000 80%);
    padding:clamp(8px,2.2vh,28px);
  }

  /* ===== physical CRT bezel (rounded box around the screen) ===== */
  .bezel{
    position:relative;height:100%;width:100%;
    border-radius:34px;
    padding:clamp(10px,1.8vh,22px);
    background:linear-gradient(160deg,#2a2f2a,#141714 55%,#090b09);
    box-shadow:
      inset 0 2px 3px rgba(255,255,255,.12),
      inset 0 -4px 10px rgba(0,0,0,.7),
      0 30px 60px rgba(0,0,0,.8),
      0 0 0 2px #000;
  }

  /* ===== CRT screen wrapper (rounded, curved glass) ===== */
  .crt{
    position:absolute;inset:clamp(10px,1.8vh,22px);
    display:flex;flex-direction:column;
    background:var(--bg);
    border-radius:26px;
    overflow:hidden;
    /* curved-glass corners darken inward */
    box-shadow:
      inset 0 0 60px 12px rgba(0,0,0,.85),
      inset 0 0 140px 40px rgba(0,0,0,.45);
    animation:warp 9s ease-in-out infinite;
  }
  /* subtle screen "breathing" warp for tube feel */
  @keyframes warp{
    0%,100%{transform:scale(1.000);}
    50%{transform:scale(1.004);}
  }

  /* scanlines */
  .crt::before{
    content:'';position:absolute;inset:0;z-index:50;pointer-events:none;
    background:repeating-linear-gradient(0deg,var(--scan) 0px,var(--scan) 1px,transparent 1px,transparent 3px);
  }
  /* vignette + flicker + curved glare */
  .crt::after{
    content:'';position:absolute;inset:0;z-index:51;pointer-events:none;border-radius:26px;
    background:
      radial-gradient(120% 80% at 30% 8%, rgba(255,255,255,.06), transparent 40%),
      radial-gradient(ellipse at center,transparent 52%,rgba(0,0,0,0.6) 100%);
    animation:flicker 6s infinite;
  }
  @keyframes flicker{
    0%,100%{opacity:1}
    97%{opacity:1}
    97.5%{opacity:0.82}
    98%{opacity:1}
    99.2%{opacity:0.9}
  }

  /* power-on sweep when a new keyword loads */
  .crt.boot::before{ animation:none; }
  .sweep{
    position:absolute;inset:0;z-index:60;pointer-events:none;opacity:0;
  }
  .sweep.go{
    animation:sweep .55s ease-out;
  }
  @keyframes sweep{
    0%{opacity:1;background:linear-gradient(180deg,transparent 0%,rgba(51,255,102,.55) 49%,rgba(255,255,255,.85) 50%,rgba(51,255,102,.55) 51%,transparent 100%);background-size:100% 12px;background-repeat:no-repeat;background-position:0 -12px;}
    100%{opacity:0;background-position:0 100%;}
  }

  /* header */
  header{
    flex-shrink:0;border-bottom:1px solid var(--green-dark);
    padding:14px 22px;display:flex;justify-content:space-between;align-items:baseline;gap:12px;
    background:linear-gradient(180deg,rgba(51,255,102,0.04),transparent);
    position:relative;z-index:5;
  }
  .logo{
    font-family:'Major Mono Display',monospace;
    font-size:clamp(22px,4.4vw,40px);letter-spacing:.08em;color:var(--green);
  }
  .logo .blink{color:var(--amber);}
  .hdr-meta{
    font-size:15px;color:var(--green-dim);letter-spacing:.1em;text-transform:uppercase;
    text-align:right;line-height:1.6;
  }
  .hdr-meta .on{color:var(--amber);}
  .hdr-meta .srv,.hdr-meta .snd{cursor:pointer;}
  .hdr-meta .srv:hover,.hdr-meta .snd:hover{color:var(--green);}

  /* feed */
  .feed{
    flex:1;overflow-y:auto;padding:26px 28px 10px;
    font-size:clamp(20px,2.9vw,34px);line-height:1.5;
    scrollbar-width:thin;scrollbar-color:var(--green-dark) transparent;
    position:relative;z-index:5;
  }
  .feed::-webkit-scrollbar{width:8px;}
  .feed::-webkit-scrollbar-thumb{background:var(--green-dark);}

  .line{margin-bottom:14px;white-space:pre-wrap;word-break:break-word;}
  .line.user{color:var(--amber);}
  .line.user .who{opacity:.7;}
  .line.sys{color:var(--green-dim);font-size:.82em;letter-spacing:.06em;}
  .line.err{color:#ff5a5a;text-shadow:0 0 6px rgba(255,90,90,.5);}

  .headline{margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;}
  .headline .idx{color:var(--green-dim);flex-shrink:0;}
  .headline a{color:var(--green);text-decoration:none;border-bottom:1px dashed var(--green-dark);}
  .headline a:hover{color:var(--amber);border-bottom-color:var(--amber);}
  .headline .src{color:var(--green-dim);font-size:.72em;letter-spacing:.05em;}

  /* blinking cursor */
  .cursor{
    display:inline-block;width:.6em;height:1.05em;
    background:var(--green);margin-left:2px;vertical-align:text-bottom;
    box-shadow:var(--glow);animation:blink 1s steps(1) infinite;
  }
  @keyframes blink{0%,50%{opacity:1}50.01%,100%{opacity:0}}

  /* input prompt */
  .prompt-row{
    flex-shrink:0;border-top:1px solid var(--green-dark);
    padding:16px 28px;display:flex;align-items:center;gap:14px;
    background:linear-gradient(0deg,rgba(51,255,102,0.04),transparent);
    position:relative;z-index:5;
  }
  .prompt-sign{font-size:clamp(20px,2.9vw,34px);color:var(--amber);flex-shrink:0;}
  #input{
    flex:1;background:transparent;border:none;outline:none;
    color:var(--green);font-family:'Share Tech Mono',monospace;
    font-size:clamp(20px,2.9vw,34px);text-shadow:var(--glow);
    letter-spacing:.02em;caret-color:var(--green);
  }
  #input::placeholder{color:var(--green-dark);}
  #send{
    background:transparent;border:1px solid var(--green-dark);color:var(--green);
    font-family:'Share Tech Mono',monospace;font-size:17px;letter-spacing:.1em;
    padding:10px 20px;cursor:pointer;text-transform:uppercase;text-shadow:var(--glow);
    transition:.15s;flex-shrink:0;
  }
  #send:hover{background:var(--green-dark);color:var(--amber);}
  #send:disabled{opacity:.35;cursor:not-allowed;}

  .suggest{
    display:flex;gap:10px;flex-wrap:wrap;margin-top:6px;
  }
  .chip{
    background:transparent;border:1px solid var(--green-dark);color:var(--green-dim);
    font-family:'Share Tech Mono',monospace;font-size:15px;letter-spacing:.08em;
    padding:6px 14px;cursor:pointer;text-transform:uppercase;transition:.15s;
  }
  .chip:hover{border-color:var(--green);color:var(--green);}
</style>
</head>
<body>
<div class="bezel">
  <div class="crt" id="crt">
    <div class="sweep" id="sweep"></div>
    <header>
      <div class="logo">news<span class="blink">_</span>wire</div>
      <div class="hdr-meta">
        <div><span class="on">●</span> on air · v2.4</div>
        <div class="snd" id="snd" title="Toggle typing sound">[ snd: on ]</div>
        <div class="srv" id="srv" title="Click to set server URL">[ srv: config ]</div>
      </div>
    </header>

    <div class="feed" id="feed"></div>

    <div class="prompt-row">
      <span class="prompt-sign">&gt;</span>
      <input id="input" type="text" autocomplete="off" autofocus
             placeholder="type a topic — world, tech, bitcoin, mars…  (press ENTER on empty to load more)">
      <button id="send">SEND</button>
    </div>
  </div>
</div>

<script>
const DEFAULT_SERVER_URL='https://newviwe-production.up.railway.app';
const SERVER_KEY='newswire_server_url_v1';
let SERVER_URL=(localStorage.getItem(SERVER_KEY)||DEFAULT_SERVER_URL).replace(/\/+$/,'');

const MAX_HEADLINES=30;   // hard cap per topic
const BATCH_SIZE=5;       // headlines loaded per ENTER

const feed=document.getElementById('feed');
const input=document.getElementById('input');
const send=document.getElementById('send');
const srv=document.getElementById('srv');
const snd=document.getElementById('snd');
const sweep=document.getElementById('sweep');

let busy=false;
let soundOn=true;

/* ---- pagination state ---- */
let currentTopic=null;   // topic currently on screen
let fullNews=[];         // full list (up to MAX_HEADLINES) for current topic
let shownCount=0;        // how many headlines have been typed so far

/* ---- Web Audio typing sound (synthesized, no files) ---- */
let audioCtx=null;
function ensureAudio(){
  if(!audioCtx){
    try{ audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ audioCtx=null; }
  }
  if(audioCtx&&audioCtx.state==='suspended') audioCtx.resume();
}
function clickSound(){
  if(!soundOn||!audioCtx) return;
  const t=audioCtx.currentTime;
  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  osc.type='square';
  osc.frequency.setValueAtTime(620+Math.random()*420,t);
  gain.gain.setValueAtTime(0.0001,t);
  gain.gain.exponentialRampToValueAtTime(0.05,t+0.004);
  gain.gain.exponentialRampToValueAtTime(0.0001,t+0.045);
  osc.connect(gain);gain.connect(audioCtx.destination);
  osc.start(t);osc.stop(t+0.05);
}
function beep(freq,dur){
  if(!soundOn||!audioCtx) return;
  const t=audioCtx.currentTime;
  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  osc.type='sine';osc.frequency.setValueAtTime(freq,t);
  gain.gain.setValueAtTime(0.0001,t);
  gain.gain.exponentialRampToValueAtTime(0.08,t+0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  osc.connect(gain);gain.connect(audioCtx.destination);
  osc.start(t);osc.stop(t+dur);
}

snd.addEventListener('click',()=>{
  soundOn=!soundOn;
  snd.textContent='[ snd: '+(soundOn?'on':'off')+' ]';
  if(soundOn) ensureAudio();
});
['click','keydown'].forEach(ev=>document.addEventListener(ev,ensureAudio,{once:true}));

function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function cleanTitle(t){return String(t||'').replace(/\s+-\s+[^-]+$/,'').trim();}
function stripTags(s){return String(s||'').replace(/<[^>]+>/g,'').trim();}
function extractSrc(it){
  if(it.source) return it.source;
  if(it.author) return it.author;
  const m=String(it.title||'').match(/\s-\s([^-]+)$/);
  return m?m[1].trim():'wire';
}
function scrollDown(){feed.scrollTop=feed.scrollHeight;}

/* ---- clear the screen + power-on sweep ---- */
function clearScreen(){
  feed.innerHTML='';
  feed.scrollTop=0;
  sweep.classList.remove('go');
  // force reflow so the animation can replay every time
  void sweep.offsetWidth;
  sweep.classList.add('go');
  beep(420,0.06);
}

/* persistent idle cursor */
let idleEl=null;
function showIdleCursor(){
  hideIdleCursor();
  idleEl=document.createElement('div');
  idleEl.className='line';
  idleEl.innerHTML='<span style="color:var(--amber)">&gt; </span><span class="cursor"></span>';
  feed.appendChild(idleEl);scrollDown();
}
function hideIdleCursor(){ if(idleEl){idleEl.remove();idleEl=null;} }

/* "press ENTER for more" hint (only while more headlines remain) */
let hintEl=null;
function clearHint(){ if(hintEl){hintEl.remove();hintEl=null;} }
function hasMore(){
  return currentTopic && shownCount>0 &&
         shownCount<fullNews.length && shownCount<MAX_HEADLINES;
}

function addLine(text,cls=''){
  const d=document.createElement('div');
  d.className='line '+cls;
  d.textContent=text;
  feed.appendChild(d);scrollDown();
  return d;
}

/* typewriter */
function typeInto(el,text,speed=18){
  return new Promise(res=>{
    el.textContent='';
    const cur=document.createElement('span');cur.className='cursor';
    el.appendChild(cur);
    let i=0;
    (function step(){
      if(i<text.length){
        const ch=text[i];
        cur.insertAdjacentText('beforebegin',ch);
        if(ch!==' ') clickSound();
        i++;scrollDown();
        let d=speed+Math.random()*18;
        if('.,!?;:'.includes(ch)) d+=120;
        setTimeout(step,d);
      }else{ cur.remove(); res(); }
    })();
  });
}

function thinkingLine(label){
  const d=addLine('','sys');
  let dots=0;
  d.textContent=label;
  const cur=document.createElement('span');cur.className='cursor';d.appendChild(cur);
  const t=setInterval(()=>{
    dots=(dots+1)%4;
    d.firstChild.textContent=label+'.'.repeat(dots);
  },280);
  return {el:d,stop:()=>{clearInterval(t);d.remove();}};
}

const TOPIC_FEEDS={
  world:'https://news.google.com/rss/headlines/section/topic/WORLD?hl=en-US&gl=US&ceid=US:en',
  business:'https://news.google.com/rss/headlines/section/topic/BUSINESS?hl=en-US&gl=US&ceid=US:en',
  tech:'https://news.google.com/rss/headlines/section/topic/TECHNOLOGY?hl=en-US&gl=US&ceid=US:en',
  technology:'https://news.google.com/rss/headlines/section/topic/TECHNOLOGY?hl=en-US&gl=US&ceid=US:en',
  science:'https://news.google.com/rss/headlines/section/topic/SCIENCE?hl=en-US&gl=US&ceid=US:en',
  sport:'https://news.google.com/rss/headlines/section/topic/SPORTS?hl=en-US&gl=US&ceid=US:en',
  sports:'https://news.google.com/rss/headlines/section/topic/SPORTS?hl=en-US&gl=US&ceid=US:en',
  health:'https://news.google.com/rss/headlines/section/topic/HEALTH?hl=en-US&gl=US&ceid=US:en',
  top:'https://news.google.com/rss?hl=en-US&gl=US&ceid=US:en'
};

function feedUrlFor(topic){
  const key=topic.toLowerCase().trim();
  if(TOPIC_FEEDS[key]) return TOPIC_FEEDS[key];
  return 'https://news.google.com/rss/search?q='+encodeURIComponent(topic)+'&hl=en-US&gl=US&ceid=US:en';
}

async function getNews(topic){
  const rss=feedUrlFor(topic);
  let items=null;
  if(SERVER_URL){
    try{
      const r=await fetch(SERVER_URL+'/feed?url='+encodeURIComponent(rss));
      if(r.ok){
        const d=await r.json();
        if(Array.isArray(d.items)&&d.items.length){
          items=d.items.map(it=>({title:cleanTitle(it.title),link:it.link,src:extractSrc(it)}));
        }
      }
    }catch(e){}
  }
  if(!items){
    try{
      const r=await fetch('https://api.rss2json.com/v1/api.json?count=30&rss_url='+encodeURIComponent(rss));
      const d=await r.json();
      if(d.status==='ok'&&Array.isArray(d.items)&&d.items.length){
        items=d.items.map(it=>({title:cleanTitle(it.title),link:it.link,src:extractSrc(it)}));
      }
    }catch(e){}
  }
  // keep up to MAX_HEADLINES so we can page through them 5 at a time
  return items?items.filter(a=>a.title).slice(0,MAX_HEADLINES):null;
}

/* type the next batch of up to BATCH_SIZE headlines (no screen clear) */
async function renderBatch(){
  const start=shownCount;
  const end=Math.min(start+BATCH_SIZE, fullNews.length, MAX_HEADLINES);
  for(let i=start;i<end;i++){
    const a=fullNews[i];
    const row=document.createElement('div');row.className='headline';
    const idx=document.createElement('span');idx.className='idx';
    idx.textContent=String(i+1).padStart(2,'0')+'.';
    const body=document.createElement('div');
    const titleSpan=document.createElement('span');
    row.appendChild(idx);body.appendChild(titleSpan);row.appendChild(body);
    feed.appendChild(row);scrollDown();
    await typeInto(titleSpan,a.title,10);
    const link=document.createElement('a');
    link.href=a.link;link.target='_blank';link.rel='noopener';
    link.textContent=a.title;
    titleSpan.replaceWith(link);
    const src=document.createElement('span');src.className='src';
    src.textContent='   ['+a.src+']';
    body.appendChild(src);
    scrollDown();
    await new Promise(r=>setTimeout(r,90));
  }
  shownCount=end;
}

/* NEW TOPIC: clear screen, fetch up to 30, type the first 5 */
async function handle(topic){
  if(busy) return;
  busy=true;input.disabled=true;send.disabled=true;
  ensureAudio();beep(880,0.08);

  /* === CLEAR SCREEN + start typing from the top === */
  clearScreen();

  addLine('user@wire:~$ '+topic,'user');
  const think=thinkingLine('accessing newswire — query "'+topic+'"');

  let news;
  try{ news=await getNews(topic); }catch(e){ news=null; }
  think.stop();

  if(!news||!news.length){
    currentTopic=null;fullNews=[];shownCount=0;
    const l=addLine('','err');
    await typeInto(l,'>> SIGNAL LOST. No headlines found for "'+topic+'". Check the server (click [srv: config]) or try another topic.',12);
    finish();return;
  }

  currentTopic=topic;
  fullNews=news;
  shownCount=0;

  const head=addLine('','sys');
  await typeInto(head,'>> '+fullNews.length+' transmissions on the wire // '+topic.toUpperCase(),14);

  await renderBatch();   // first 5
  finish();
}

/* SAME TOPIC: append the next 5 (triggered by ENTER on empty input) */
async function loadMore(){
  if(busy) return;
  if(!hasMore()) return;
  busy=true;input.disabled=true;send.disabled=true;
  ensureAudio();beep(880,0.08);

  hideIdleCursor();
  clearHint();

  await renderBatch();   // next 5
  finish();
}

function finish(){
  busy=false;input.disabled=false;send.disabled=false;input.focus();
  beep(660,0.1);
  clearHint();
  // no "end of feed" line — just a subtle hint while more remain
  if(hasMore()){
    hintEl=addLine('','sys');
    hintEl.textContent='>> press ENTER for '+BATCH_SIZE+' more ▌';
  }
  showIdleCursor();
}

function submit(){
  if(busy) return;
  const v=input.value.trim();
  if(v){
    input.value='';
    handle(v);            // new topic
  }else{
    loadMore();           // ENTER on empty input → next 5 on same topic
  }
}
send.addEventListener('click',submit);
input.addEventListener('keydown',e=>{
  if(e.key==='Enter'){ submit(); return; }
  if(e.key.length===1||e.key==='Backspace') clickSound();
});

srv.addEventListener('click',()=>{
  const v=prompt('News server base URL (no trailing slash).\nLeave blank to use the public rss2json fallback.',SERVER_URL);
  if(v===null) return;
  const c=v.trim().replace(/\/+$/,'');
  if(c) localStorage.setItem(SERVER_KEY,c); else localStorage.removeItem(SERVER_KEY);
  location.reload();
});

/* boot sequence */
(async function boot(){
  sweep.classList.add('go');
  const l1=addLine('','sys');
  await typeInto(l1,'NEWSWIRE TERMINAL v2.4 — established uplink '+new Date().toLocaleString(),10);
  const l2=addLine('','sys');
  await typeInto(l2,'>> ready. enter a topic to pull live headlines from the wire.',12);

  const wrap=document.createElement('div');wrap.className='suggest';
  ['world','tech','business','science','sport','bitcoin'].forEach(t=>{
    const c=document.createElement('button');c.className='chip';c.textContent=t;
    c.addEventListener('click',()=>{ if(!busy) handle(t); });
    wrap.appendChild(c);
  });
  feed.appendChild(wrap);scrollDown();
  input.focus();
  showIdleCursor();
})();
</script>
</body>
</html>
