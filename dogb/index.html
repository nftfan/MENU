<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>stacks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1f1f1e;
    --ink:#d97757;
    --ink-dim:#8a5a48;
    --ink-faint:#4a3730;
    --line:#33302d;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    overflow:hidden;
    touch-action:manipulation;
    -webkit-text-size-adjust:100%;
    text-size-adjust:100%;
  }

  .app{
    position:fixed;inset:0;
    display:flex;flex-direction:column;
  }

  /* ── top: wordmark strip ── */
  .strip{
    flex-shrink:0;
    padding:calc(env(safe-area-inset-top,0px) + 10px) 14px 10px;
    display:flex;justify-content:space-between;align-items:baseline;
    border-bottom:1px solid var(--line);
  }
  .wordmark{font-size:12px;font-weight:500;letter-spacing:.28em;text-transform:uppercase;}
  .wordmark::after{content:'_';animation:blink 1.1s steps(1) infinite;}
  @keyframes blink{0%,50%{opacity:1}50.01%,100%{opacity:0}}
  .count{font-size:9px;color:var(--ink-dim);letter-spacing:.1em;}

  /* ── results ── */
  .list{
    flex:1;overflow-y:auto;
    padding:6px 0 12px;
    scrollbar-width:none;
    -webkit-overflow-scrolling:touch;
  }
  .list::-webkit-scrollbar{display:none;}

  .empty{
    padding:40px 20px;text-align:center;
    color:var(--ink-dim);font-size:11px;line-height:2;
  }
  .empty .big{font-size:22px;display:block;margin-bottom:8px;color:var(--ink-faint);}

  .book{
    padding:13px 14px;
    border-bottom:1px solid var(--line);
    cursor:pointer;
    animation:rise .25s ease both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}
  .book .top{display:flex;gap:10px;align-items:baseline;}
  .book .n{color:var(--ink-faint);font-size:9px;flex-shrink:0;width:20px;}
  .book .title{font-size:12px;font-weight:500;line-height:1.45;}
  .book .meta{
    margin:4px 0 0 30px;
    font-size:9px;color:var(--ink-dim);letter-spacing:.06em;
  }
  .book .desc{
    margin:8px 0 2px 30px;
    font-size:11px;line-height:1.7;color:var(--ink);opacity:.85;
    display:none;
  }
  .book.open .desc{display:block;}
  .book .more{
    margin:6px 0 0 30px;font-size:9px;color:var(--ink-dim);letter-spacing:.1em;text-transform:uppercase;
  }
  .book.open .more{display:none;}

  .status{
    padding:14px;font-size:10px;color:var(--ink-dim);letter-spacing:.08em;
  }
  .status.err{color:var(--ink);}

  /* ── bottom: search ── */
  .search{
    flex-shrink:0;
    border-top:1px solid var(--line);
    padding:10px 14px calc(env(safe-area-inset-bottom,0px) + 10px);
    display:flex;gap:10px;align-items:center;
  }
  .search .sign{color:var(--ink-dim);font-size:12px;flex-shrink:0;}
  #q{
    flex:1;min-width:0;
    background:transparent;border:none;outline:none;
    color:var(--ink);font-family:'IBM Plex Mono',monospace;font-size:12px;
    caret-color:var(--ink);letter-spacing:.02em;
  }
  #q::placeholder{color:var(--ink-faint);}
  #go{
    background:transparent;border:1px solid var(--ink-dim);color:var(--ink);
    font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.14em;
    padding:6px 14px;text-transform:uppercase;flex-shrink:0;cursor:pointer;
  }
  #go:active{background:var(--ink);color:var(--bg);}
  #go:disabled{opacity:.35;}
</style>
</head>
<body>
<div class="app">
  <div class="strip">
    <div class="wordmark">stacks</div>
    <div class="count" id="count"></div>
  </div>

  <div class="list" id="list">
    <div class="empty">
      <span class="big">⌘</span>
      search any book, author or subject<br>
      title + description from the open shelves
    </div>
  </div>

  <div class="search">
    <span class="sign">&gt;</span>
    <input id="q" type="text" autocomplete="off" placeholder="dune, tolkien, stoicism…">
    <button id="go">find</button>
  </div>
</div>

<script>
const list=document.getElementById('list');
const q=document.getElementById('q');
const go=document.getElementById('go');
const count=document.getElementById('count');
let busy=false;

function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function clip(s,n){s=String(s||'').replace(/<[^>]+>/g,'').trim();return s.length>n?s.slice(0,n).replace(/\s+\S*$/,'')+'…':s;}

async function search(term){
  if(busy) return;
  busy=true;go.disabled=true;q.disabled=true;
  count.textContent='';
  list.innerHTML='<div class="status">searching “'+esc(term)+'”…</div>';

  let items=null;
  try{
    const r=await fetch('https://www.googleapis.com/books/v1/volumes?q='
      +encodeURIComponent(term)+'&maxResults=20&printType=books');
    const d=await r.json();
    if(Array.isArray(d.items)) items=d.items;
  }catch(e){}

  if(!items||!items.length){
    list.innerHTML='<div class="status err">nothing on the shelf for “'+esc(term)+'”. try another query.</div>';
    finish();return;
  }

  const books=items.map(it=>{
    const v=it.volumeInfo||{};
    return {
      title:v.title||'untitled',
      authors:(v.authors||[]).join(', '),
      year:(v.publishedDate||'').slice(0,4),
      pages:v.pageCount||null,
      desc:v.description||''
    };
  }).filter(b=>b.title);

  list.innerHTML='';
  count.textContent=books.length+' found';

  books.forEach((b,i)=>{
    const el=document.createElement('div');
    el.className='book';
    el.style.animationDelay=(i*40)+'ms';
    const meta=[b.authors,b.year,b.pages?b.pages+'p':''].filter(Boolean).join(' · ');
    const full=b.desc?esc(clip(b.desc,900)):'no description on file.';
    el.innerHTML=
      '<div class="top"><span class="n">'+String(i+1).padStart(2,'0')+'</span>'
      +'<span class="title">'+esc(b.title)+'</span></div>'
      +(meta?'<div class="meta">'+esc(meta)+'</div>':'')
      +'<div class="desc">'+full+'</div>'
      +'<div class="more">tap for description</div>';
    el.addEventListener('click',()=>el.classList.toggle('open'));
    list.appendChild(el);
  });
  list.scrollTop=0;
  finish();
}

function finish(){busy=false;go.disabled=false;q.disabled=false;}

function submit(){
  const v=q.value.trim();
  if(!v||busy) return;
  q.blur(); // no keyboard zoom / dismiss keyboard
  search(v);
}
go.addEventListener('click',submit);
q.addEventListener('keydown',e=>{if(e.key==='Enter')submit();});
</script>
</body>
</html>
