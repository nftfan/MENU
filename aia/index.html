<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- Full-screen standalone behaviour when added to iPhone home screen -->
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AI Photo Hub">
<meta name="theme-color" content="#0c0e16">
<title>AI Photo Hub</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Space+Mono:wght@700&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#0c0e16;
    --bg2:#141826;
    --ink:#f4f6ff;
    --muted:#8b93ad;
    --a1:#5b8cff;      /* link A accent */
    --a1b:#3a63d6;
    --b1:#ff7d54;      /* link B accent */
    --b1b:#e05a2f;
    --line:rgba(255,255,255,.08);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:'Sora',-apple-system,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(900px 500px at 15% -10%, rgba(91,140,255,.18), transparent 60%),
      radial-gradient(800px 500px at 90% 0%, rgba(255,125,84,.16), transparent 55%),
      var(--bg);
    min-height:100%;
    /* respect the iPhone notch / home indicator safe areas */
    padding:
      calc(env(safe-area-inset-top) + 22px)
      calc(env(safe-area-inset-right) + 18px)
      calc(env(safe-area-inset-bottom) + 28px)
      calc(env(safe-area-inset-left) + 18px);
  }

  header{
    text-align:center;
    margin-bottom:26px;
    animation:rise .6s ease both;
  }
  .logo{
    width:58px;height:58px;margin:0 auto 14px;
    border-radius:18px;
    display:grid;place-items:center;
    font-family:'Space Mono',monospace;font-size:26px;font-weight:700;
    background:linear-gradient(135deg,var(--a1),var(--b1));
    box-shadow:0 12px 30px rgba(91,140,255,.35),0 6px 16px rgba(255,125,84,.25);
  }
  h1{font-size:24px;font-weight:800;letter-spacing:-.02em;margin:0;}
  header p{color:var(--muted);font-size:13.5px;margin:6px 0 0;}

  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    max-width:480px;margin:0 auto;
  }
  .tile{
    position:relative;
    display:flex;align-items:center;gap:10px;
    padding:16px 14px;
    border-radius:16px;
    text-decoration:none;color:var(--ink);
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid var(--line);
    overflow:hidden;
    transition:transform .12s ease, box-shadow .2s ease, border-color .2s ease;
    animation:rise .5s ease both;
  }
  .tile:active{transform:scale(.96);}
  .dot{
    flex:0 0 auto;width:34px;height:34px;border-radius:11px;
    display:grid;place-items:center;font-size:16px;
  }
  .tile .name{font-family:'Space Mono',monospace;font-weight:700;font-size:16px;letter-spacing:.02em;}
  .tile .sub{font-size:11px;color:var(--muted);margin-top:2px;}
  .txt{display:flex;flex-direction:column;line-height:1.1;min-width:0;}

  /* Link A styling */
  .a .dot{background:linear-gradient(135deg,var(--a1),var(--a1b));box-shadow:0 6px 16px rgba(91,140,255,.4);}
  .a:active{border-color:var(--a1);box-shadow:0 8px 24px rgba(91,140,255,.25);}
  /* Link B styling */
  .b .dot{background:linear-gradient(135deg,var(--b1),var(--b1b));box-shadow:0 6px 16px rgba(255,125,84,.4);}
  .b:active{border-color:var(--b1);box-shadow:0 8px 24px rgba(255,125,84,.25);}

  footer{text-align:center;color:var(--muted);font-size:11px;margin-top:26px;}

  @keyframes rise{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
</style>
</head>
<body>

  <header>
    <div class="logo">AI</div>
    <h1>AI Photo Hub</h1>
    <p>Quick launch · Image Generator &amp; Photo Editor</p>
  </header>

  <main class="grid" id="grid"></main>

  <footer>Tap a tile to open the tool</footer>

<script>
  const LINK_A = "https://photoeditorai.io/ai-image-generator/";
  const LINK_B = "https://ezremove.ai/ai-photo-editor/";

  const grid = document.getElementById("grid");
  let frag = "";

  for (let i = 1; i <= 10; i++) {
    // aia# -> Link A
    frag += `
      <a class="tile a" href="${LINK_A}">
        <span class="dot">✨</span>
        <span class="txt"><span class="name">aia${i}</span><span class="sub">Image Generator</span></span>
      </a>`;
    // aib# -> Link B
    frag += `
      <a class="tile b" href="${LINK_B}">
        <span class="dot">🧽</span>
        <span class="txt"><span class="name">aib${i}</span><span class="sub">Photo Editor</span></span>
      </a>`;
  }
  grid.innerHTML = frag;

  // Stagger the entrance animation
  [...grid.children].forEach((el, n) => el.style.animationDelay = (n * 28) + "ms");

  // Keep links inside the standalone app window instead of bouncing to Safari
  grid.addEventListener("click", (e) => {
    const a = e.target.closest("a");
    if (a && window.navigator.standalone) {
      e.preventDefault();
      window.location.href = a.href;
    }
  });
</script>
</body>
</html>
